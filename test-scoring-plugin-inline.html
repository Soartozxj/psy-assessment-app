<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scoring插件自动化测试</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f7fa;
        padding: 20px;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        color: #1a1a1a;
      }
      .layout {
        display: flex;
        gap: 20px;
      }
      .test-panel {
        flex: 1;
        background: white;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .iframe-panel {
        flex: 1;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      iframe {
        width: 100%;
        height: 800px;
        border: none;
      }
      .test-btn {
        background: #1890ff;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        margin: 5px;
      }
      .test-btn:hover {
        background: #40a9ff;
      }
      .test-btn.success {
        background: #52c41a;
      }
      .test-btn.danger {
        background: #ff4d4f;
      }
      .export-btn {
        background: #722ed1;
      }
      .log {
        background: #1a1a1a;
        color: #0f0;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        padding: 15px;
        border-radius: 6px;
        height: 400px;
        overflow-y: auto;
        margin-top: 15px;
        white-space: pre-wrap;
      }
      .result-item {
        padding: 10px;
        margin: 5px 0;
        border-radius: 6px;
        border-left: 4px solid #ccc;
      }
      .result-item.pass {
        background: #f6ffed;
        border-color: #52c41a;
      }
      .result-item.fail {
        background: #fff2f0;
        border-color: #ff4d4f;
      }
      .result-item.info {
        background: #e6f7ff;
        border-color: #1890ff;
      }
      .summary {
        background: #1a1a1a;
        color: white;
        padding: 15px;
        border-radius: 6px;
        margin-top: 15px;
      }
      .summary h3 {
        margin-bottom: 10px;
        color: #1890ff;
      }
      .progress {
        height: 20px;
        background: #f0f0f0;
        border-radius: 10px;
        overflow: hidden;
        margin: 10px 0;
      }
      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #1890ff, #52c41a);
        transition: width 0.3s;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🧮 Scoring插件自动化测试</h1>

      <div class="layout">
        <!-- 测试面板 -->
        <div class="test-panel">
          <h3>🧪 测试控制</h3>
          <div style="margin: 15px 0">
            <button class="test-btn" onclick="runAllTests()">▶️ 运行所有测试</button>
            <button class="test-btn" onclick="clearResults()">🗑️ 清除结果</button>
            <button class="test-btn export-btn" onclick="exportReport()">📊 导出测试报告</button>
          </div>

          <div class="progress">
            <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
          </div>

          <div id="test-results"></div>

          <h3>📋 测试日志</h3>
          <div class="log" id="test-log"></div>
        </div>

        <!-- iframe面板 -->
        <div class="iframe-panel">
          <iframe id="admin-frame" src="/mini-app-h5/backend/admin-legacy.html"></iframe>
        </div>
      </div>
    </div>

    <script>
      const testResults = [];
      let currentTest = 0;
      const totalTests = 12;

      function log(msg, type) {
        type = type || 'info';
        var logEl = document.getElementById('test-log');
        var time = new Date().toLocaleTimeString();
        var prefix = 'ℹ️';
        if (type === 'error') prefix = '❌';
        if (type === 'warn') prefix = '⚠️';
        logEl.textContent += '[' + time + '] ' + prefix + ' ' + msg + '\n';
        logEl.scrollTop = logEl.scrollHeight;
      }

      function addResult(id, name, passed, message) {
        testResults.push({
          id: id,
          name: name,
          passed: passed,
          message: message,
          time: new Date().toLocaleTimeString()
        });

        var resultsEl = document.getElementById('test-results');
        var div = document.createElement('div');
        div.className = 'result-item ' + (passed ? 'pass' : 'fail');
        div.innerHTML =
          '<strong>' +
          (passed ? '✅' : '❌') +
          ' ' +
          name +
          '</strong><br><small>' +
          message +
          '</small><br><small style="color: #999">' +
          new Date().toLocaleTimeString() +
          '</small>';
        resultsEl.appendChild(div);

        currentTest++;
        var progress = (currentTest / totalTests) * 100;
        document.getElementById('progress-bar').style.width = progress + '%';
      }

      function clearResults() {
        testResults.length = 0;
        currentTest = 0;
        document.getElementById('test-results').innerHTML = '';
        document.getElementById('test-log').textContent = '';
        document.getElementById('progress-bar').style.width = '0%';
        log('测试结果已清除');
      }

      function getAdminFrame() {
        var frame = document.getElementById('admin-frame');
        return frame.contentWindow;
      }

      function sleep(ms) {
        return new Promise(function (resolve) {
          setTimeout(resolve, ms);
        });
      }

      async function waitForLoad() {
        var admin = getAdminFrame();
        var attempts = 0;

        log('  等待页面加载...', 'info');

        while (!admin.document || !admin.document.body) {
          await sleep(500);
          attempts++;

          if (attempts > 20) {
            throw new Error('页面加载超时（document/body 不存在）');
          }
        }

        while (admin.document.readyState !== 'complete') {
          await sleep(500);
          attempts++;

          if (attempts > 40) {
            log('  页面 readyState 超时，尝试继续...', 'warn');
            break;
          }
        }

        log('  页面加载完成（readyState: ' + admin.document.readyState + '）', 'info');

        attempts = 0;
        while (!admin.PluginLoader) {
          await sleep(500);
          attempts++;

          if (attempts > 20) {
            log('  PluginLoader 超时，尝试继续...', 'warn');
            break;
          }
        }

        if (admin.PluginLoader) {
          log('  PluginLoader 已加载', 'info');
        }

        await sleep(3000);
        log('  等待完成，开始测试', 'info');
      }

      async function switchToPage(admin, sectionName) {
        var navItem = admin.document.querySelector('[data-section="' + sectionName + '"]');
        if (!navItem) {
          var navItem2 = admin.document.querySelector(
            '[data-action="switch-section"][data-section="' + sectionName + '"]'
          );
          if (!navItem2) {
            log('  未找到页面: ' + sectionName, 'error');
            return false;
          }
          navItem2.click();
        } else {
          navItem.click();
        }
        await sleep(2000);
        return true;
      }

      // ==================== 测试用例 ====================

      // 测试1: 插件加载
      async function testPluginLoad(admin) {
        log('测试1: 插件加载', 'info');

        try {
          // 等待PluginLoader初始化完成
          var attempts = 0;
          while (!admin.PluginLoader && attempts < 20) {
            await sleep(500);
            attempts++;
          }

          if (!admin.PluginLoader) {
            addResult('test-1', '插件加载', false, 'PluginLoader 未定义');
            return;
          }

          log('  PluginLoader 已加载，尝试加载 scoring 插件...', 'info');

          // 主动加载scoring插件（因为scoring是可选插件，需要主动加载）
          try {
            await admin.PluginLoader.load('scoring');
            log('  scoring 插件加载成功', 'info');
          } catch (loadError) {
            log('  主动加载失败，尝试切换页面触发按需加载...', 'warn');
            // 如果主动加载失败，切换到scoring页面触发按需加载
            await switchToPage(admin, 'scoring');
            await sleep(3000);
          }

          var plugin = admin.PluginLoader.get('scoring');
          if (!plugin) {
            addResult('test-1', '插件加载', false, 'PluginLoader 中未找到 scoring 插件');
            return;
          }

          // 验证插件是否有execute方法
          if (typeof plugin.execute !== 'function') {
            addResult('test-1', '插件加载', false, 'Scoring插件缺少 execute 方法');
            return;
          }

          addResult('test-1', '插件加载', true, '插件加载成功（PluginLoader），execute方法存在');
        } catch (error) {
          addResult('test-1', '插件加载', false, error.message);
        }
      }

      // 测试2: 量表列表渲染
      async function testScaleListRender(admin) {
        log('测试2: 量表列表渲染', 'info');

        try {
          var switched = await switchToPage(admin, 'scoring');
          if (!switched) {
            addResult('test-2', '量表列表渲染', false, '无法切换到计分规则页面');
            return;
          }

          await sleep(3000);

          var listContainer = admin.document.getElementById('scoring-scale-list');
          if (!listContainer) {
            addResult('test-2', '量表列表渲染', false, '量表列表容器不存在（ID: scoring-scale-list）');
            return;
          }

          await sleep(2000);

          var scaleItems = listContainer.querySelectorAll('.sc-scale-item');
          log('  找到 ' + scaleItems.length + ' 个量表项 (.sc-scale-item)', 'info');

          if (scaleItems.length === 0) {
            log('  未找到量表项，检查容器内容...', 'warn');
            var containerHTML = listContainer.innerHTML.substring(0, 300);
            if (containerHTML.indexOf('暂无符合条件的量表') !== -1) {
              addResult('test-2', '量表列表渲染', false, '量表列表为空（显示空状态提示）');
            } else {
              addResult('test-2', '量表列表渲染', false, '量表列表为空（未找到任何量表项）');
            }
            return;
          }

          addResult('test-2', '量表列表渲染', true, '量表列表渲染成功，共 ' + scaleItems.length + ' 个量表');
        } catch (error) {
          addResult('test-2', '量表列表渲染', false, error.message);
        }
      }

      // 测试3: 打开编辑器
      async function testOpenEditor(admin) {
        log('测试3: 打开编辑器', 'info');

        try {
          await switchToPage(admin, 'scoring');
          await sleep(3000);

          var firstItem = admin.document.querySelector('#scoring-scale-list .sc-scale-item');
          if (!firstItem) {
            addResult('test-3', '打开编辑器', false, '没有量表数据（列表为空）');
            return;
          }

          log('  找到量表项: ' + firstItem.dataset.scaleId, 'info');

          firstItem.click();
          await sleep(1500);

          var editor = admin.document.getElementById('scoring-editor');

          if (!editor) {
            addResult('test-3', '打开编辑器', false, '计分规则编辑器不存在（ID: scoring-editor）');
            return;
          }

          if (editor.style.display === 'none') {
            addResult('test-3', '打开编辑器', false, '计分规则编辑器未显示（display=none）');
            return;
          }

          addResult('test-3', '打开编辑器', true, '计分规则编辑器显示正常');
        } catch (error) {
          addResult('test-3', '打开编辑器', false, error.message);
        }
      }

            await sleep(1500);
          }

          var panel0 = admin.document.getElementById('sc-panel-0');
          if (!panel0) {
            var dimTab = admin.document.querySelector('[data-action="switch-sc-panel"][data-index="0"]');
            if (dimTab) {
              dimTab.click();
              await sleep(1000);
              panel0 = admin.document.getElementById('sc-panel-0');
            }

          if (!panel0) {

        }
      }

      // 测试9: 搜索功能
      async function testSearchFunction(admin) {
        log('测试9: 搜索功能', 'info');

        try {
          await switchToPage(admin, 'scoring');

      // 测试10: 筛选功能
      async function testFilterFunction(admin) {

        try {
          await switchToPage(admin, 'scoring');
          await sleep(2000);

          var typeFilter = admin.document.getElementById('scoring-type-filter');
          var statusFilter = admin.document.getElementById('scoring-status-filter');

          if (!typeFilter && !statusFilter) {
            addResult('test-10', '筛选功能', false, '筛选下拉框不存在');
            return;
          }

          if (typeFilter && typeFilter.options.length > 1) {
            typeFilter.selectedIndex = 1;
            typeFilter.dispatchEvent(new Event('change'));
            await sleep(500);
          }

          if (statusFilter && statusFilter.options.length > 1) {
            statusFilter.selectedIndex = 1;

      // 测试12: 插件execute方法
      async function testPluginExecute(admin) {
        log('测试12: 插件execute方法', 'info');

        try {
          var plugin = admin.PluginLoader.get('scoring');
          if (!plugin || typeof plugin.execute !== 'function') {
            addResult('test-12', '插件execute方法', false, 'Scoring插件 execute 方法不存在');
            return;
          }

          // 测试1: list action
          log('  测试 execute({action: "list"})...', 'info');
          var rules = await plugin.execute({ action: 'list' });
          if (!rules || !Array.isArray(rules)) {
            addResult('test-12', '插件execute方法', false, 'execute list 返回格式错误');
            return;
          }
          log('  list 返回 ' + rules.length + ' 条规则', 'info');

          // 测试2: get action (如果有规则)
          if (rules.length > 0) {
            log('  测试 execute({action: "get", id: ' + rules[0].id + '})...', 'info');
            var rule = await plugin.execute({ action: 'get', id: rules[0].id });
            if (!rule) {
              addResult('test-12', '插件execute方法', false, 'execute get 返回 null');
              return;
            }
            log('  get 返回规则: ' + rule.name, 'info');
          }

          // 测试3: calculate action (如果有规则)
          if (rules.length > 0) {
            log('  测试 execute({action: "calculate", ruleId: ' + rules[0].id + ', answers: {...}})...', 'info');
            try {
              var result = await plugin.execute({
                action: 'calculate',
                ruleId: rules[0].id,
                answers: { q1: 2, q2: 3, q3: 1 }
              });
              if (!result || typeof result.score !== 'number') {
                addResult('test-12', '插件execute方法', false, 'execute calculate 返回格式错误');
                return;
              }
              log('  calculate 返回 score: ' + result.score + ', interpretation: ' + result.interpretation, 'info');
            } catch (calcError) {
              log('  calculate 测试失败: ' + calcError.message, 'warn');
            }
          }

          addResult('test-12', '插件execute方法', true, '插件execute方法正常，测试了 list/get/calculate 操作');
        } catch (error) {
          addResult('test-12', '插件execute方法', false, error.message);
        }
      }

      // ==================== 运行所有测试 ====================

      async function runAllTests() {
        log('开始运行所有测试...', 'info');
        clearResults();

        var admin = getAdminFrame();

        try {
          await waitForLoad();
          log('页面加载完成', 'info');

          await testPluginLoad(admin);
          await testScaleListRender(admin);
          await testOpenEditor(admin);
          await testDimensionConfig(admin);
          await testMetricsConfig(admin);
          await testInterpretationConfig(admin);
          await testScreeningConfig(admin);
          await testSimulationPanel(admin);
          await testSearchFunction(admin);
          await testFilterFunction(admin);
          await testSaveConfig(admin);
          await testPluginExecute(admin);

          showSummary();

          log('所有测试完成！', 'info');
        } catch (error) {
          log('测试过程中发生错误: ' + error.message, 'error');
        }
      }

      function showSummary() {
        var total = testResults.length;
        var passed = testResults.filter(function (r) {
          return r.passed;
        }).length;
        var failed = total - passed;
        var passRate = total > 0 ? ((passed / total) * 100).toFixed(2) : 0;

        var summaryHtml =
          '<div class="summary"><h3>📊 测试汇总</h3><p>总测试数: ' +
          total +
          '</p><p>通过数: ' +
          passed +
          '</p><p>失败数: ' +
          failed +
          '</p><p>通过率: ' +
          passRate +
          '%</p></div>';

        document.getElementById('test-results').insertAdjacentHTML('beforeend', summaryHtml);
      }

      function exportReport() {
        var total = testResults.length;
        var passed = testResults.filter(function (r) {
          return r.passed;
        }).length;
        var failed = total - passed;
        var passRate = total > 0 ? ((passed / total) * 100).toFixed(2) : 0;

        var md = '# 📋 Scoring插件测试报告\n\n';
        md += '**测试日期**: ' + new Date().toLocaleDateString() + '\n';
        md += '**测试时间**: ' + new Date().toLocaleTimeString() + '\n';
        md += '**测试人员**: rich\n\n';
        md += '---\n\n';
        md += '## 📊 测试结果汇总\n\n';
        md += '| 指标 | 数值 |\n';
        md += '|------|------|\n';
        md += '| 总测试数 | ' + total + ' |\n';
        md += '| 通过数 | ' + passed + ' |\n';
        md += '| 失败数 | ' + failed + ' |\n';
        md += '| 通过率 | ' + passRate + '% |\n\n';
        md += '---\n\n';
        md += '## 📝 详细测试结果\n\n';

        testResults.forEach(function (result) {
          md += '### ' + result.id.replace('test-', '测试') + '. ' + result.name + '\n';
          md += '- **状态**: ' + (result.passed ? '✅ 通过' : '❌ 失败') + '\n';
          md += '- **消息**: ' + result.message + '\n\n';
        });

        var blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'Scoring插件测试报告_' + new Date().toISOString().split('T')[0] + '.md';
        a.click();
        URL.revokeObjectURL(url);

        log('测试报告已导出', 'info');
      }

      log('Scoring插件测试页面已加载', 'info');
      log('请点击"运行所有测试"按钮开始测试', 'info');
    </script>
  </body>
</html>
