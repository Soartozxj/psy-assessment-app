<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill API 测试</title>
    <style>
      body {
        font-family: monospace;
        padding: 20px;
        background: #1e1e1e;
        color: #d4d4d4;
      }
      h1 {
        color: #569cd6;
      }
      button {
        background: #0e639c;
        color: white;
        border: none;
        padding: 10px 20px;
        margin: 5px;
        cursor: pointer;
        border-radius: 4px;
      }
      button:hover {
        background: #1177bb;
      }
      pre {
        background: #252526;
        padding: 10px;
        border-radius: 4px;
        overflow: auto;
        max-height: 500px;
      }
      .success {
        color: #4ec9b0;
      }
      .error {
        color: #f48771;
      }
      .section {
        margin: 20px 0;
        padding: 10px;
        border: 1px solid #444;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>🧪 Skill API 测试工具</h1>

    <div class="section">
      <h3>1. 测试 GET /api/skills - 获取所有 Skill</h3>
      <button onclick="testGetAllSkills()">测试获取列表</button>
      <pre id="result1">等待测试...</pre>
    </div>

    <div class="section">
      <h3>2. 测试 GET /api/skills/:id - 获取单个 Skill</h3>
      <input
        type="text"
        id="skillId"
        value="meta-v2_3"
        style="background: #333; color: #fff; padding: 5px; border: 1px solid #555"
      />
      <button onclick="testGetSkillById()">测试获取单个</button>
      <pre id="result2">等待测试...</pre>
    </div>

    <div class="section">
      <h3>3. 测试 POST /api/skills - 创建 Skill</h3>
      <button onclick="testCreateSkill()">测试创建 Skill</button>
      <pre id="result3">等待测试...</pre>
    </div>

    <script>
      const API_BASE = 'http://127.0.0.1:3100';

      async function testGetAllSkills() {
        const resultEl = document.getElementById('result1');
        resultEl.className = '';
        resultEl.textContent = '测试中...';

        try {
          const res = await fetch(`${API_BASE}/api/skills`);
          const data = await res.json();
          resultEl.className = 'success';
          resultEl.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          resultEl.className = 'error';
          resultEl.textContent = '错误: ' + err.message;
        }
      }

      async function testGetSkillById() {
        const resultEl = document.getElementById('result2');
        resultEl.className = '';
        resultEl.textContent = '测试中...';

        const skillId = document.getElementById('skillId').value;
        if (!skillId) {
          resultEl.className = 'error';
          resultEl.textContent = '请输入 Skill ID';
          return;
        }

        try {
          const res = await fetch(`${API_BASE}/api/skills/${skillId}`);
          const data = await res.json();
          resultEl.className = res.ok ? 'success' : 'error';
          resultEl.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          resultEl.className = 'error';
          resultEl.textContent = '错误: ' + err.message;
        }
      }

      async function testCreateSkill() {
        const resultEl = document.getElementById('result3');
        resultEl.className = '';
        resultEl.textContent = '测试中...';

        const testSkill = {
          id: 'test-skill-' + Date.now(),
          name: '测试 Skill',
          description: '这是一个测试 Skill',
          version: '1.0.0',
          content: '# 测试内容\n\n这是一个测试 Skill 的内容。',
          metadata: {
            type: 'system-prompt',
            icon: '🧪',
            note: '测试用'
          }
        };

        try {
          const res = await fetch(`${API_BASE}/api/skills`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(testSkill)
          });
          const data = await res.json();
          resultEl.className = res.ok ? 'success' : 'error';
          resultEl.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          resultEl.className = 'error';
          resultEl.textContent = '错误: ' + err.message;
        }
      }

      // 页面加载时自动测试
      window.addEventListener('DOMContentLoaded', () => {
        console.log('Skill API 测试工具已就绪');
      });
    </script>
  </body>
</html>
