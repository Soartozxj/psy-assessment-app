<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测试 Skill</title>
    <style>
      :root {
        --bg: #faf9f7;
        --card: #fff;
        --text: #2c2c2a;
        --text-sec: #5f5e5a;
        --text-muted: #888780;
        --border: #d3d1c7;
        --primary: #534ab7;
        --primary-light: #eeedfe;
        --success: #0f6e56;
        --success-light: #e1f5ee;
        --warning: #f59e0b;
        --danger: #993556;
        --radius: 12px;
        --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
        line-height: 1.6;
      }

      /* 工具栏 */
      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 20px;
        background: var(--card);
        border-bottom: 0.5px solid var(--border);
      }
      .toolbar .back {
        font-size: 12px;
        color: var(--primary);
        cursor: pointer;
      }
      .toolbar .title {
        font-size: 14px;
        font-weight: 500;
      }
      .toolbar .spacer {
        flex: 1;
      }
      .btn {
        padding: 5px 12px;
        border-radius: 6px;
        border: 0.5px solid var(--border);
        background: var(--card);
        color: var(--text);
        font-size: 11px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .btn:hover {
        background: var(--bg);
      }
      .btn-pri {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      .btn-pri:hover {
        opacity: 0.9;
      }

      /* 测试区域 */
      .test-container {
        max-width: 900px;
        margin: 20px auto;
        padding: 0 20px;
      }
      .skill-info {
        background: var(--card);
        border: 0.5px solid var(--border);
        border-radius: var(--radius);
        padding: 15px;
        margin-bottom: 15px;
      }
      .skill-name {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 5px;
      }
      .skill-meta {
        font-size: 11px;
        color: var(--text-muted);
        display: flex;
        gap: 10px;
      }

      /* 测试表单 */
      .test-form {
        background: var(--card);
        border: 0.5px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        margin-bottom: 15px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-sec);
        margin-bottom: 5px;
      }
      .form-textarea {
        width: 100%;
        min-height: 150px;
        padding: 10px;
        border: 0.5px solid var(--border);
        border-radius: 6px;
        font-size: 12px;
        background: var(--bg);
        font-family: 'Monaco', 'Menlo', monospace;
        line-height: 1.5;
        resize: vertical;
      }
      .form-textarea:focus {
        outline: none;
        border-color: var(--primary);
      }

      /* 测试结果 */
      .test-result {
        background: var(--card);
        border: 0.5px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
      }
      .result-header {
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 0.5px solid var(--border);
      }
      .result-body {
        font-size: 12px;
        line-height: 1.8;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 400px;
        overflow-y: auto;
        padding: 10px;
        background: var(--bg);
        border-radius: 6px;
      }
      .result-meta {
        display: flex;
        gap: 15px;
        margin-top: 10px;
        font-size: 10px;
        color: var(--text-muted);
      }

      /* 加载状态 */
      .loading {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-muted);
      }
      .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid var(--border);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- 工具栏 -->
    <div class="toolbar">
      <span class="back" onclick="location.href = 'admin-skill.html'">← 返回列表</span>
      <span class="title">🧪 测试 Skill</span>
      <span class="spacer"></span>
      <button class="btn" onclick="loadSkill()">🔄 重新加载</button>
    </div>

    <!-- 测试区域 -->
    <div class="test-container">
      <!-- Skill 信息 -->
      <div class="skill-info" id="skill-info">
        <div class="loading">
          <div class="spinner"></div>
          <div style="margin-top: 10px">加载中...</div>
        </div>
      </div>

      <!-- 测试表单 -->
      <div class="test-form">
        <div class="form-group">
          <label class="form-label">测试参数（JSON 格式）</label>
          <textarea class="form-textarea" id="test-params" placeholder='{"key": "value"}'>{}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">测试输入</label>
          <textarea class="form-textarea" id="test-input" placeholder="输入测试内容..."></textarea>
        </div>
        <button class="btn btn-pri" onclick="runTest()" style="width: 100%; justify-content: center">
          🚀 运行测试
        </button>
      </div>

      <!-- 测试结果 -->
      <div class="test-result" id="test-result" style="display: none">
        <div class="result-header">📊 测试结果</div>
        <div class="result-body" id="result-body"></div>
        <div class="result-meta" id="result-meta"></div>
      </div>
    </div>

    <script>
      let currentSkill = null;
      let startTime = null;

      // 加载 Skill 数据
      async function loadSkill() {
        const params = new URLSearchParams(location.search);
        const skillId = params.get('id');

        if (!skillId) {
          document.getElementById('skill-info').innerHTML =
            '<div style="color:var(--danger);padding:20px;">❌ 缺少 Skill ID</div>';
          return;
        }

        try {
          const res = await fetch(`http://127.0.0.1:3100/api/skills/${skillId}`);
          if (!res.ok) throw new Error('Skill 不存在');
          currentSkill = await res.json();

          renderSkillInfo();
        } catch (err) {
          document.getElementById('skill-info').innerHTML =
            `<div style="color:var(--danger);padding:20px;">❌ 加载失败: ${err.message}</div>`;
        }
      }

      // 渲染 Skill 信息
      function renderSkillInfo() {
        if (!currentSkill) return;

        document.getElementById('skill-info').innerHTML = `
        <div class="skill-name">${currentSkill.metadata?.icon || '📝'} ${currentSkill.name}</div>
        <div class="skill-meta">
          <span>📋 ${currentSkill.metadata?.type || 'system-prompt'}</span>
          <span>📏 v${currentSkill.version || '1.0'}</span>
          <span>📏 ${(currentSkill.content || '').length} 字</span>
        </div>
      `;
      }

      // 运行测试
      async function runTest() {
        if (!currentSkill) {
          alert('请先加载 Skill');
          return;
        }

        const paramsText = document.getElementById('test-params').value;
        const inputText = document.getElementById('test-input').value;

        let params = {};
        try {
          params = JSON.parse(paramsText);
        } catch (e) {
          alert('测试参数 JSON 格式错误');
          return;
        }

        // 显示加载状态
        document.getElementById('test-result').style.display = 'block';
        document.getElementById('result-body').innerHTML =
          '<div class="loading"><div class="spinner"></div><div style="margin-top:10px;">测试中...</div></div>';
        document.getElementById('result-meta').innerHTML = '';

        // 记录开始时间
        startTime = Date.now();

        try {
          // 模拟 Skill 执行（实际应该调用后端 API）
          // 这里简单返回 Skill 内容 + 测试输入
          const result = `
=== Skill 信息 ===
名称: ${currentSkill.name}
版本: ${currentSkill.version}
类型: ${currentSkill.metadata?.type || 'system-prompt'}

=== Skill 内容 ===
${currentSkill.content || '(空)'}

=== 测试参数 ===
${JSON.stringify(params, null, 2)}

=== 测试输入 ===
${inputText || '(空)'}

=== 执行结果 ===
（这里应该是 Skill 的实际执行结果）
        `;

          // 模拟延迟
          await new Promise((resolve) => setTimeout(resolve, 500));

          const endTime = Date.now();
          const duration = endTime - startTime;

          document.getElementById('result-body').textContent = result;
          document.getElementById('result-meta').innerHTML = `
          <span>⏱️ 响应时间: ${duration}ms</span>
          <span>📏 结果长度: ${result.length} 字符</span>
          <span>✅ 状态: 成功</span>
        `;
        } catch (err) {
          const endTime = Date.now();
          const duration = endTime - startTime;

          document.getElementById('result-body').textContent = `❌ 测试失败:\n\n${err.message}`;
          document.getElementById('result-meta').innerHTML = `
          <span>⏱️ 响应时间: ${duration}ms</span>
          <span>❌ 状态: 失败</span>
        `;
        }
      }

      // 页面加载时执行
      window.addEventListener('DOMContentLoaded', loadSkill);
    </script>
  </body>
</html>
