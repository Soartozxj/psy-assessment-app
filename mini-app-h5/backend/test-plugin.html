<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>插件系统测试页面 v20260530-1152</title>

    <!-- 引入插件系统核心模块（必须放在最前面） -->
    <script src="plugin-base.js?v=20260530-1218"></script>
    <script>
      console.log('[After plugin-base.js] PluginBase:', typeof window.PluginBase);
    </script>

    <script src="dual-adapter.js?v=20260530-1218"></script>
    <script>
      console.log('[After dual-adapter.js] Adapter:', typeof window.Adapter);
    </script>

    <script src="event-hub.js?v=20260530-1218"></script>
    <script>
      console.log('[After event-hub.js] EventHub:', typeof window.EventHub);
    </script>

    <script src="plugin-loader.js?v=20260530-1218"></script>
    <script>
      console.log('[After plugin-loader.js] PluginLoader:', typeof window.PluginLoader);
      if (window.PluginLoader) {
        console.log('  PluginLoader type:', Object.prototype.toString.call(window.PluginLoader));
        console.log('  PluginLoader methods:', Object.getOwnPropertyNames(Object.getPrototypeOf(window.PluginLoader)));
        console.log('  PluginLoader has plugins:', window.PluginLoader.plugins ? 'yes' : 'no');
      }
    </script>

    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        background: #f5f5f5;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
      }
      .status {
        padding: 10px;
        margin: 10px 0;
        border-radius: 4px;
      }
      .success {
        background: #d4edda;
        color: #155724;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
      }
      .info {
        background: #d1ecf1;
        color: #0c5460;
      }
      button {
        padding: 8px 16px;
        margin: 5px;
        cursor: pointer;
      }
      pre {
        background: #f8f9fa;
        padding: 10px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔧 插件系统测试页面</h1>

      <div id="status-panel">
        <div class="status info">⏳ 正在初始化插件系统...</div>
      </div>

      <h3>操作按钮</h3>
      <button onclick="testLoadAI()">加载 AI 插件</button>
      <button onclick="testExecuteAI()">执行 AI 插件</button>
      <button onclick="testDestroyAI()">销毁 AI 插件</button>
      <button onclick="checkStatus()">检查状态</button>

      <h3>执行结果</h3>
      <pre id="result"></pre>

      <h3>控制台日志</h3>
      <div id="logs"></div>
    </div>

    <script>
      // 调试：检查脚本加载状态
      function checkScriptsLoaded() {
        console.log('🔍 检查脚本加载状态...');
        console.log('   PluginBase:', typeof window.PluginBase);
        console.log('   Adapter:', typeof window.Adapter);
        console.log('   EventHub:', typeof window.EventHub);
        console.log('   PluginLoader:', typeof window.PluginLoader);

        if (window.PluginLoader) {
          console.log('   PluginLoader 方法检查:');
          console.log('     - load:', typeof window.PluginLoader.load);
          console.log('     - get:', typeof window.PluginLoader.get);
          console.log('     - unload:', typeof window.PluginLoader.unload);
          console.log('     - init:', typeof window.PluginLoader.init);
        }
      }

      // 页面加载完成后检查
      window.addEventListener('load', function () {
        setTimeout(checkScriptsLoaded, 100);
      });

      // 拦截 console.log 输出到页面
      const originalLog = console.log;
      const originalError = console.error;
      const originalWarn = console.warn;

      function addLog(type, ...args) {
        const logsDiv = document.getElementById('logs');
        const div = document.createElement('div');
        div.className = `status ${type}`;
        div.textContent = args.map((a) => (typeof a === 'object' ? JSON.stringify(a) : String(a))).join(' ');
        logsDiv.appendChild(div);
      }

      console.log = function (...args) {
        originalLog.apply(console, args);
        addLog('info', ...args);
      };
      console.error = function (...args) {
        originalError.apply(console, args);
        addLog('error', ...args);
      };
      console.warn = function (...args) {
        originalWarn.apply(console, args);
        addLog('info', ...args);
      };

      // 更新状态面板
      function updateStatus(message, type = 'info') {
        const panel = document.getElementById('status-panel');
        panel.innerHTML = `<div class="status ${type}">${message}</div>`;
      }

      // 显示结果
      function showResult(data) {
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      }

      // 测试：加载 AI 插件
      async function testLoadAI() {
        try {
          // 防御性检查
          if (!window.PluginLoader) {
            throw new Error('PluginLoader 未定义，请刷新页面');
          }
          if (typeof PluginLoader.load !== 'function') {
            console.error('PluginLoader 详情:', PluginLoader);
            throw new Error(`PluginLoader.load 不是函数，当前类型: ${typeof PluginLoader.load}`);
          }

          updateStatus('⏳ 正在加载 AI 插件...', 'info');
          const plugin = await PluginLoader.load('ai');
          updateStatus('✅ AI 插件加载成功！', 'success');
          showResult({
            name: plugin.name,
            version: plugin.version,
            description: plugin.description,
            isInitialized: plugin.isInitialized
          });
        } catch (error) {
          updateStatus('❌ AI 插件加载失败：' + error.message, 'error');
          showResult({ error: error.message, stack: error.stack });
        }
      }

      // 测试：执行 AI 插件
      async function testExecuteAI() {
        try {
          // 防御性检查
          if (!window.PluginLoader) {
            throw new Error('PluginLoader 未定义，请刷新页面');
          }
          if (typeof PluginLoader.get !== 'function') {
            console.error('PluginLoader 详情:', PluginLoader);
            throw new Error(`PluginLoader.get 不是函数，当前类型: ${typeof PluginLoader.get}`);
          }

          const plugin = PluginLoader.get('ai');
          if (!plugin) {
            updateStatus('⚠️ AI 插件未加载，请先加载', 'error');
            return;
          }

          updateStatus('⏳ 正在执行 AI 插件...', 'info');
          const result = await plugin.execute({ action: 'test' });
          updateStatus('✅ AI 插件执行成功！', 'success');
          showResult(result);
        } catch (error) {
          updateStatus('❌ AI 插件执行失败：' + error.message, 'error');
          showResult({ error: error.message, stack: error.stack });
        }
      }

      // 测试：销毁 AI 插件
      function testDestroyAI() {
        try {
          // 防御性检查
          if (!window.PluginLoader) {
            throw new Error('PluginLoader 未定义，请刷新页面');
          }
          if (typeof PluginLoader.unload !== 'function') {
            console.error('PluginLoader 详情:', PluginLoader);
            throw new Error(`PluginLoader.unload 不是函数，当前类型: ${typeof PluginLoader.unload}`);
          }

          PluginLoader.unload('ai');
          updateStatus('✅ AI 插件已销毁', 'success');
          showResult({ status: 'destroyed' });
        } catch (error) {
          updateStatus('❌ AI 插件销毁失败：' + error.message, 'error');
          showResult({ error: error.message, stack: error.stack });
        }
      }

      // 检查状态
      function checkStatus() {
        // 防御性检查
        if (!window.PluginLoader) {
          showResult({ error: 'PluginLoader 未加载' });
          return;
        }

        if (!PluginLoader.plugins) {
          showResult({ error: 'PluginLoader.plugins 未定义，可能初始化失败' });
          return;
        }

        const plugins = Object.keys(PluginLoader.plugins);
        showResult({
          loadedPlugins: plugins,
          pluginCount: plugins.length,
          corePlugins: PluginLoader.corePlugins || [],
          optionalPlugins: PluginLoader.optionalPlugins || []
        });
      }

      // 确保 PluginLoader 加载完成后再初始化
      async function initPluginSystem() {
        // 等待 PluginLoader 加载完成（最多等待 5 秒）
        const maxWait = 5000;
        const interval = 100;
        let waited = 0;

        while (!window.PluginLoader || typeof window.PluginLoader.init !== 'function') {
          if (waited >= maxWait) {
            throw new Error('PluginLoader 加载超时，请刷新页面重试');
          }
          console.log('⏳ 等待 PluginLoader 加载...');
          await new Promise((resolve) => setTimeout(resolve, interval));
          waited += interval;
        }

        console.log('🚀 开始初始化插件系统...');

        try {
          // 预加载核心插件
          await window.PluginLoader.init();

          updateStatus(
            '✅ 插件系统初始化完成！已加载：' + Object.keys(window.PluginLoader.plugins).join(', '),
            'success'
          );
          console.log('✅ 插件系统初始化完成');
          console.log('   已加载插件:', Object.keys(window.PluginLoader.plugins).join(', '));
        } catch (error) {
          const errorMsg = '❌ 插件系统初始化失败：' + (error && error.message ? error.message : String(error));
          updateStatus(errorMsg, 'error');
          console.error('❌ 插件系统初始化失败：', error);
        }
      }

      // 页面加载完成后初始化插件系统
      document.addEventListener('DOMContentLoaded', initPluginSystem);
    </script>
  </body>
</html>
