<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>量表插件内联测试</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding: 20px;
        background: #f0f2f5;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
      }
      .header {
        background: white;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .header h1 {
        font-size: 24px;
        color: #333;
        margin-bottom: 8px;
      }
      .header p {
        font-size: 14px;
        color: #666;
        margin-bottom: 16px;
      }

      .btn {
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
        margin-right: 8px;
        margin-bottom: 8px;
      }
      .btn-primary {
        background: #4a90d9;
        color: white;
      }
      .btn-success {
        background: #52c41a;
        color: white;
      }
      .btn-danger {
        background: #ff4d4f;
        color: white;
      }
      .btn-default {
        background: white;
        color: #333;
        border: 1px solid #d9d9d9;
      }

      .test-results {
        background: white;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .test-results h2 {
        font-size: 18px;
        color: #333;
        margin-bottom: 16px;
        padding-bottom: 8px;
        border-bottom: 2px solid #4a90d9;
      }

      .result-item {
        padding: 12px;
        margin-bottom: 8px;
        border-radius: 6px;
        border-left: 4px solid #d9d9d9;
      }
      .result-item.passed {
        background: #f6ffed;
        border-left-color: #52c41a;
      }
      .result-item.failed {
        background: #fff2f0;
        border-left-color: #ff4d4f;
      }
      .result-item.running {
        background: #e6f7ff;
        border-left-color: #1890ff;
      }

      .result-title {
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 4px;
      }
      .result-message {
        font-size: 13px;
        color: #666;
      }

      .summary {
        display: flex;
        gap: 20px;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid #e8e8e8;
      }
      .summary-item {
        text-align: center;
      }
      .summary-item .value {
        font-size: 32px;
        font-weight: 700;
      }
      .summary-item .label {
        font-size: 12px;
        color: #666;
      }
      .summary-item.passed .value {
        color: #52c41a;
      }
      .summary-item.failed .value {
        color: #ff4d4f;
      }
      .summary-item.total .value {
        color: #4a90d9;
      }

      .log-panel {
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 12px;
        border-radius: 6px;
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 12px;
        line-height: 1.5;
        max-height: 400px;
        overflow-y: auto;
        margin-top: 16px;
      }
      .log-panel .log-line {
        margin-bottom: 4px;
      }
      .log-panel .log-success {
        color: #4ec9b0;
      }
      .log-panel .log-error {
        color: #f48771;
      }
      .log-panel .log-warn {
        color: #ce9178;
      }
      .log-panel .log-info {
        color: #9cdcfe;
      }

      .progress-bar {
        background: #f0f0f0;
        height: 8px;
        border-radius: 4px;
        overflow: hidden;
        margin-top: 16px;
      }
      .progress-bar .progress-fill {
        background: linear-gradient(90deg, #4a90d9, #52c41a);
        height: 100%;
        width: 0%;
        transition: width 0.3s ease;
      }

      iframe {
        width: 100%;
        height: 800px;
        border: 2px solid #e8e8e8;
        border-radius: 8px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>📋 量表插件内联测试</h1>
        <p>在 admin-legacy.html 页面中直接测试 scale-plugin.js 的所有功能</p>

        <div>
          <button class="btn btn-primary" onclick="runAllTests()">▶️ 运行所有测试</button>
          <button class="btn btn-default" onclick="clearResults()">🗑️ 清除结果</button>
          <button class="btn btn-success" onclick="exportReport()">📊 导出报告</button>
          <button class="btn btn-default" onclick="openAdminPage()">🔗 打开管理页面</button>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div class="summary" id="summary" style="display: none">
          <div class="summary-item total">
            <div class="value" id="total-count">0</div>
            <div class="label">总测试数</div>
          </div>
          <div class="summary-item passed">
            <div class="value" id="passed-count">0</div>
            <div class="label">通过</div>
          </div>
          <div class="summary-item failed">
            <div class="value" id="failed-count">0</div>
            <div class="label">失败</div>
          </div>
        </div>
      </div>

      <div class="test-results">
        <h2>📝 测试结果</h2>
        <div id="results-container"></div>
      </div>

      <div class="test-results">
        <h2>📋 测试日志</h2>
        <div class="log-panel" id="log-panel"></div>
      </div>

      <div class="test-results">
        <h2>🖥️ 管理页面预览</h2>
        <iframe id="admin-frame" src="/mini-app-h5/backend/admin-legacy.html"></iframe>
      </div>
    </div>

    <script>
      let testResults = [];
      let adminFrame = null;

      // 日志函数
      function log(message, type = 'info') {
        const panel = document.getElementById('log-panel');
        const line = document.createElement('div');
        line.className = 'log-line log-' + type;
        line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        panel.appendChild(line);
        panel.scrollTop = panel.scrollHeight;
      }

      // 清除结果
      function clearResults() {
        document.getElementById('results-container').innerHTML = '';
        document.getElementById('log-panel').innerHTML = '';
        testResults = [];
        log('结果已清除', 'info');
      }

      // 添加测试结果
      function addResult(testId, title, passed, message) {
        const container = document.getElementById('results-container');
        const item = document.createElement('div');
        item.className = 'result-item ' + (passed ? 'passed' : 'failed');
        item.id = 'result-' + testId;
        item.innerHTML = `
        <div class="result-title">${passed ? '✅' : '❌'} ${title}</div>
        <div class="result-message">${message}</div>
      `;
        container.appendChild(item);

        testResults.push({ testId, title, passed, message });

        // 更新进度
        const progress = (testResults.length / 24) * 100;
        document.getElementById('progress-fill').style.width = progress + '%';

        // 更新汇总
        updateSummary();
      }

      // 更新汇总
      function updateSummary() {
        const passed = testResults.filter((r) => r.passed).length;
        const failed = testResults.filter((r) => !r.passed).length;

        document.getElementById('total-count').textContent = testResults.length;
        document.getElementById('passed-count').textContent = passed;
        document.getElementById('failed-count').textContent = failed;
        document.getElementById('summary').style.display = 'flex';
      }

      // 获取iframe中的admin页面
      function getAdminFrame() {
        return document.getElementById('admin-frame').contentWindow;
      }

      // 等待admin页面加载完成
      function waitForAdminPage() {
        return new Promise((resolve) => {
          const frame = document.getElementById('admin-frame');

          frame.onload = () => {
            log('管理页面加载完成', 'success');
            resolve(frame.contentWindow);
          };

          // 如果已经加载完成
          if (frame.contentWindow && frame.contentWindow.document.readyState === 'complete') {
            log('管理页面已加载', 'success');
            resolve(frame.contentWindow);
          }
        });
      }

      // ====================================================
      // 测试函数
      // ====================================================

      async function runAllTests() {
        log('开始运行所有测试...', 'info');
        clearResults();

        const admin = await waitForAdminPage();

        // 等待插件加载
        await sleep(2000);

        // 测试1: 插件加载
        await testPluginLoad(admin);

        // 测试2: 量表列表渲染
        await testScaleListRender(admin);

        // 测试3: 搜索筛选
        await testSearchFilter(admin);

        // 测试4: 分类筛选
        await testCategoryFilter(admin);

        // 测试5: 状态筛选
        await testStatusFilter(admin);

        // 测试6: 排序功能
        await testSortFunction(admin);

        // 测试7: 新建量表
        await testCreateScale(admin);

        // 测试8: 编辑量表
        await testEditScale(admin);

        // 测试9: 删除量表
        await testDeleteScale(admin);

        // 测试10: 导出功能
        await testExportScale(admin);

        // 测试11: 事件通信
        await testEventCommunication(admin);

        // 测试12: 存储同步
        await testStorageSync(admin);

        log('所有测试完成！', 'info');
      }

      // 测试1: 插件加载
      async function testPluginLoad(admin) {
        log('测试1: 插件加载', 'info');

        try {
          // 等待插件加载完成
          await sleep(3000);

          // 检查插件是否已加载到 PluginLoader
          const plugin = admin.PluginLoader.get('scale');
          if (!plugin) {
            // 尝试手动加载
            log('  尝试手动加载插件...', 'warn');
            try {
              await admin.PluginLoader.load('scale', false);
              await sleep(1000);
            } catch (e) {
              addResult('test-1', '插件加载', false, 'PluginLoader 中未找到 scale 插件，且手动加载失败: ' + e.message);
              return;
            }
          }

          // 再次检查
          const plugin2 = admin.PluginLoader.get('scale');
          if (!plugin2) {
            addResult('test-1', '插件加载', false, 'PluginLoader 中未找到 scale 插件');
            return;
          }

          addResult('test-1', '插件加载', true, '插件加载成功（PluginLoader）');
        } catch (error) {
          addResult('test-1', '插件加载', false, error.message);
        }
      }

      // 测试2: 量表列表渲染
      async function testScaleListRender(admin) {
        log('测试2: 量表列表渲染', 'info');

        try {
          // 切换到量表管理页面
          const navScale = admin.document.querySelector('[data-page="scales"]');
          if (navScale) {
            navScale.click();
            await sleep(1000);
          }

          // 检查量表列表表格是否存在
          const tbody = admin.document.getElementById('scale-table-body');
          if (!tbody) {
            addResult('test-2', '量表列表渲染', false, '量表列表表格不存在');
            return;
          }

          // 检查是否有数据行
          const rows = tbody.querySelectorAll('tr');
          addResult('test-2', '量表列表渲染', true, `量表列表渲染成功，共 ${rows.length} 个量表`);
        } catch (error) {
          addResult('test-2', '量表列表渲染', false, error.message);
        }
      }

      // 测试3: 搜索筛选
      async function testSearchFilter(admin) {
        log('测试3: 搜索筛选', 'info');

        try {
          const searchInput = admin.document.getElementById('scale-search');
          if (!searchInput) {
            addResult('test-3', '搜索筛选', false, '搜索框不存在');
            return;
          }

          // 输入搜索关键词
          searchInput.value = '测试';
          searchInput.dispatchEvent(new Event('input'));

          await sleep(500);

          addResult('test-3', '搜索筛选', true, '搜索筛选功能正常');
        } catch (error) {
          addResult('test-3', '搜索筛选', false, error.message);
        }
      }

      // 测试4: 分类筛选
      async function testCategoryFilter(admin) {
        log('测试4: 分类筛选', 'info');

        try {
          // 实际ID是 cat-filter-hdr
          const catFilter = admin.document.getElementById('cat-filter-hdr');
          if (!catFilter) {
            addResult('test-4', '分类筛选', false, '分类筛选下拉框不存在（ID: cat-filter-hdr）');
            return;
          }

          // 选择第一个非空的分类选项
          if (catFilter.options.length > 1) {
            catFilter.selectedIndex = 1;
            catFilter.dispatchEvent(new Event('change'));
            await sleep(500);
          }

          addResult('test-4', '分类筛选', true, '分类筛选功能正常');
        } catch (error) {
          addResult('test-4', '分类筛选', false, error.message);
        }
      }

      // 测试5: 状态筛选
      async function testStatusFilter(admin) {
        log('测试5: 状态筛选', 'info');

        try {
          // 实际ID是 status-filter-hdr
          const statusFilter = admin.document.getElementById('status-filter-hdr');
          if (!statusFilter) {
            addResult('test-5', '状态筛选', false, '状态筛选下拉框不存在（ID: status-filter-hdr）');
            return;
          }

          // 选择状态（已上架 = 1）
          statusFilter.value = '1';
          statusFilter.dispatchEvent(new Event('change'));

          await sleep(500);

          addResult('test-5', '状态筛选', true, '状态筛选功能正常');
        } catch (error) {
          addResult('test-5', '状态筛选', false, error.message);
        }
      }

      // 测试6: 排序功能
      async function testSortFunction(admin) {
        log('测试6: 排序功能', 'info');

        try {
          // 实际使用的是评分列头的下拉框（ID不是onclick）
          // 找到评分列头的排序下拉框
          const ratingSortSelect = admin.document.querySelector('th select[onchange*="rating"]');
          if (!ratingSortSelect) {
            addResult('test-6', '排序功能', false, '评分排序下拉框不存在');
            return;
          }

          // 选择降序
          ratingSortSelect.value = 'desc';
          ratingSortSelect.dispatchEvent(new Event('change'));

          await sleep(500);

          addResult('test-6', '排序功能', true, '排序功能正常');
        } catch (error) {
          addResult('test-6', '排序功能', false, error.message);
        }
      }

      // 测试7: 新建量表
      async function testCreateScale(admin) {
        log('测试7: 新建量表', 'info');

        try {
          // 直接调用全局函数 openEditModal（新建量表）
          if (typeof admin.openEditModal !== 'function') {
            addResult('test-7', '新建量表', false, 'openEditModal 函数不存在');
            return;
          }

          // 调用 openEditModal(null) 新建量表
          log('  调用 openEditModal(null)...', 'info');
          admin.openEditModal(null);

          // 增加等待时间，确保弹窗完全显示
          await sleep(2000);

          // 检查弹窗是否显示（正确的ID是 scale-modal）
          const modal = admin.document.getElementById('scale-modal');
          if (!modal) {
            addResult('test-7', '新建量表', false, 'scale-modal 元素不存在');
            return;
          }

          log('  弹窗 display: ' + modal.style.display, 'info');
          log('  弹窗 class: ' + modal.className, 'info');

          if (modal.style.display === 'none' || modal.classList.contains('hidden')) {
            // 尝试调用 openModal 函数
            if (typeof admin.openModal === 'function') {
              log('  尝试调用 openModal()...', 'info');
              admin.openModal();
              await sleep(1000);
            }

            // 再次检查
            if (modal.style.display === 'none' || modal.classList.contains('hidden')) {
              addResult('test-7', '新建量表', false, '新建量表弹窗未显示（display=' + modal.style.display + '）');
              return;
            }
          }

          addResult('test-7', '新建量表', true, '新建量表弹窗显示正常');

          // 关闭弹窗
          const closeBtn = modal.querySelector('.modal-close, [data-action="close-modal"]');
          if (closeBtn) {
            closeBtn.click();
            await sleep(500);
          } else {
            // 尝试调用 hideScaleForm
            if (typeof admin.hideScaleForm === 'function') {
              admin.hideScaleForm();
              await sleep(500);
            } else if (typeof admin.closeModal === 'function') {
              admin.closeModal();
              await sleep(500);
            }
          }
        } catch (error) {
          addResult('test-7', '新建量表', false, error.message);
        }
      }

      // 测试8: 编辑量表
      async function testEditScale(admin) {
        log('测试8: 编辑量表', 'info');

        try {
          // 等待量表列表渲染完成
          await sleep(1000);

          // 获取第一个量表的ID（从表格行中获取）
          const firstRow = admin.document.querySelector('#scale-table-body tr');
          if (!firstRow) {
            addResult('test-8', '编辑量表', false, '没有量表数据（表格为空）');
            return;
          }

          // 从onclick属性中获取量表ID
          const editBtn = firstRow.querySelector('[onclick*="openEditModal"]');
          if (!editBtn) {
            addResult('test-8', '编辑量表', false, '编辑按钮不存在');
            return;
          }

          // 直接调用 openEditModal 函数
          if (typeof admin.openEditModal !== 'function') {
            addResult('test-8', '编辑量表', false, 'openEditModal 函数不存在');
            return;
          }

          // 从onclick属性中提取量表ID
          const match = editBtn.getAttribute('onclick').match(/openEditModal\((\d+)\)/);
          if (!match) {
            addResult('test-8', '编辑量表', false, '无法提取量表ID');
            return;
          }

          const scaleId = parseInt(match[1]);

          // 调用 openEditModal(scaleId) 编辑第一个量表
          log('  调用 openEditModal(' + scaleId + ')...', 'info');
          admin.openEditModal(scaleId);

          await sleep(2000);

          // 检查弹窗是否显示（正确的ID是 scale-modal）
          const modal = admin.document.getElementById('scale-modal');
          if (!modal) {
            addResult('test-8', '编辑量表', false, 'scale-modal 元素不存在');
            return;
          }

          log('  弹窗 display: ' + modal.style.display, 'info');
          log('  弹窗 class: ' + modal.className, 'info');

          if (modal.style.display === 'none' || modal.classList.contains('hidden')) {
            addResult('test-8', '编辑量表', false, '编辑量表弹窗未显示（display=' + modal.style.display + '）');
            return;
          }

          addResult('test-8', '编辑量表', true, '编辑量表弹窗显示正常');

          // 关闭弹窗
          const closeBtn = modal.querySelector('.modal-close, [data-action="close-modal"]');
          if (closeBtn) {
            closeBtn.click();
            await sleep(500);
          } else {
            // 尝试调用 hideScaleForm
            if (typeof admin.hideScaleForm === 'function') {
              admin.hideScaleForm();
              await sleep(500);
            } else if (typeof admin.closeModal === 'function') {
              admin.closeModal();
              await sleep(500);
            }
          }
        } catch (error) {
          addResult('test-8', '编辑量表', false, error.message);
        }
      }

      // 测试9: 删除量表
      async function testDeleteScale(admin) {
        log('测试9: 删除量表', 'info');

        try {
          // 检查 confirmDelete 函数是否存在
          if (typeof admin.confirmDelete !== 'function') {
            addResult('test-9', '删除量表', false, 'confirmDelete 函数不存在');
            return;
          }

          // 检查是否有量表数据（从表格行中获取）
          const firstRow = admin.document.querySelector('#scale-table-body tr');
          if (!firstRow) {
            addResult('test-9', '删除量表', false, '没有量表数据（表格为空）');
            return;
          }

          addResult('test-9', '删除量表', true, 'confirmDelete 函数存在，功能入口正常');
        } catch (error) {
          addResult('test-9', '删除量表', false, error.message);
        }
      }

      // 测试10: 导出功能
      async function testExportScale(admin) {
        log('测试10: 导出功能', 'info');

        try {
          // 检查 exportSingleScale 函数是否存在
          if (typeof admin.exportSingleScale !== 'function') {
            addResult('test-10', '导出功能', false, 'exportSingleScale 函数不存在');
            return;
          }

          // 检查是否有量表数据（从表格行中获取）
          const firstRow = admin.document.querySelector('#scale-table-body tr');
          if (!firstRow) {
            addResult('test-10', '导出功能', false, '没有量表数据（表格为空）');
            return;
          }

          addResult('test-10', '导出功能', true, 'exportSingleScale 函数存在，功能入口正常');
        } catch (error) {
          addResult('test-10', '导出功能', false, error.message);
        }
      }

      // 测试11: 事件通信
      async function testEventCommunication(admin) {
        log('测试11: 事件通信', 'info');

        try {
          // 检查 EventHub 是否存在
          if (typeof admin.EventHub === 'undefined') {
            addResult('test-11', '事件通信', false, 'EventHub 不存在');
            return;
          }

          // 检查事件监听是否正常
          if (typeof admin.EventHub.on !== 'function') {
            addResult('test-11', '事件通信', false, 'EventHub.on 方法不存在');
            return;
          }

          addResult('test-11', '事件通信', true, '事件通信功能正常');
        } catch (error) {
          addResult('test-11', '事件通信', false, error.message);
        }
      }

      // 测试12: 存储同步
      async function testStorageSync(admin) {
        log('测试12: 存储同步', 'info');

        try {
          // 检查 localStorage 中是否有数据
          const data = admin.localStorage.getItem('psy_scales');
          if (!data) {
            addResult('test-12', '存储同步', false, 'localStorage 中没有 psy_scales 数据');
            return;
          }

          // 检查数据是否有效
          try {
            JSON.parse(data);
            addResult('test-12', '存储同步', true, '存储同步功能正常');
          } catch (e) {
            addResult('test-12', '存储同步', false, 'localStorage 数据解析失败: ' + e.message);
          }
        } catch (error) {
          addResult('test-12', '存储同步', false, error.message);
        }
      }

      // 辅助函数
      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      // 导出报告
      function exportReport() {
        const passed = testResults.filter((r) => r.passed).length;
        const failed = testResults.filter((r) => !r.passed).length;

        let report = '# 📋 量表插件测试报告\n\n';
        report += `**测试日期**: ${new Date().toLocaleDateString()}\n`;
        report += `**测试时间**: ${new Date().toLocaleTimeString()}\n`;
        report += `**测试人员**: rich\n\n`;
        report += '---\n\n';
        report += '## 📊 测试结果汇总\n\n';
        report += `| 指标 | 数值 |\n`;
        report += `|------|------|\n`;
        report += `| 总测试数 | ${testResults.length} |\n`;
        report += `| 通过数 | ${passed} |\n`;
        report += `| 失败数 | ${failed} |\n`;
        report += `| 通过率 | ${((passed / testResults.length) * 100).toFixed(2)}% |\n\n`;
        report += '---\n\n';
        report += '## 📝 详细测试结果\n\n';

        testResults.forEach((result, idx) => {
          report += `### ${idx + 1}. ${result.title}\n`;
          report += `- **状态**: ${result.passed ? '✅ 通过' : '❌ 失败'}\n`;
          report += `- **消息**: ${result.message}\n\n`;
        });

        const blob = new Blob([report], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `量表插件测试报告_${new Date().toISOString().split('T')[0]}.md`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        log('测试报告已导出', 'success');
      }

      // 打开管理页面
      function openAdminPage() {
        window.open('/mini-app-h5/backend/admin-legacy.html', '_blank');
      }

      // 页面加载完成后初始化
      document.addEventListener('DOMContentLoaded', () => {
        log('测试页面加载完成', 'info');
      });
    </script>
  </body>
</html>
