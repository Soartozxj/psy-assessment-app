<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NPC插件自动化测试</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f7fa;
        padding: 20px;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        color: #1a1a1a;
      }
      .layout {
        display: flex;
        gap: 20px;
      }
      .test-panel {
        flex: 1;
        background: white;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .iframe-panel {
        flex: 1;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      iframe {
        width: 100%;
        height: 800px;
        border: none;
      }
      .test-btn {
        background: #1890ff;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        margin: 5px;
      }
      .test-btn:hover {
        background: #40a9ff;
      }
      .test-btn.success {
        background: #52c41a;
      }
      .test-btn.danger {
        background: #ff4d4f;
      }
      .export-btn {
        background: #722ed1;
      }
      .log {
        background: #1a1a1a;
        color: #0f0;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        padding: 15px;
        border-radius: 6px;
        height: 400px;
        overflow-y: auto;
        margin-top: 15px;
        white-space: pre-wrap;
      }
      .result-item {
        padding: 10px;
        margin: 5px 0;
        border-radius: 6px;
        border-left: 4px solid #ccc;
      }
      .result-item.pass {
        background: #f6ffed;
        border-color: #52c41a;
      }
      .result-item.fail {
        background: #fff2f0;
        border-color: #ff4d4f;
      }
      .result-item.info {
        background: #e6f7ff;
        border-color: #1890ff;
      }
      .summary {
        background: #1a1a1a;
        color: white;
        padding: 15px;
        border-radius: 6px;
        margin-top: 15px;
      }
      .summary h3 {
        margin-bottom: 10px;
        color: #1890ff;
      }
      .progress {
        height: 20px;
        background: #f0f0f0;
        border-radius: 10px;
        overflow: hidden;
        margin: 10px 0;
      }
      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #1890ff, #52c41a);
        transition: width 0.3s;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🖼️ NPC插件自动化测试</h1>

      <div class="layout">
        <!-- 测试面板 -->
        <div class="test-panel">
          <h3>🧪 测试控制</h3>
          <div style="margin: 15px 0">
            <button class="test-btn" onclick="runAllTests()">▶️ 运行所有测试</button>
            <button class="test-btn" onclick="clearResults()">🗑️ 清除结果</button>
            <button class="test-btn export-btn" onclick="exportReport()">📊 导出测试报告</button>
          </div>

          <div class="progress">
            <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
          </div>

          <div id="test-results"></div>

          <h3>📋 测试日志</h3>
          <div class="log" id="test-log"></div>
        </div>

        <!-- iframe面板 -->
        <div class="iframe-panel">
          <iframe id="admin-frame" src="/mini-app-h5/backend/admin-legacy.html"></iframe>
        </div>
      </div>
    </div>

    <script>
      const testResults = [];
      let currentTest = 0;
      const totalTests = 12;

      function log(msg, type = 'info') {
        const logEl = document.getElementById('test-log');
        const time = new Date().toLocaleTimeString();
        const prefix = type === 'error' ? '❌' : type === 'warn' ? '⚠️' : 'ℹ️';
        logEl.textContent += `[${time}] ${prefix} ${msg}\n`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      function addResult(id, name, passed, message) {
        testResults.push({ id, name, passed, message, time: new Date().toLocaleTimeString() });

        const resultsEl = document.getElementById('test-results');
        const div = document.createElement('div');
        div.className = `result-item ${passed ? 'pass' : 'fail'}`;
        div.innerHTML = `
        <strong>${passed ? '✅' : '❌'} ${name}</strong><br>
        <small>${message}</small><br>
        <small style="color: #999">${new Date().toLocaleTimeString()}</small>
      `;
        resultsEl.appendChild(div);

        // 更新进度
        currentTest++;
        const progress = (currentTest / totalTests) * 100;
        document.getElementById('progress-bar').style.width = progress + '%';
      }

      function clearResults() {
        testResults.length = 0;
        currentTest = 0;
        document.getElementById('test-results').innerHTML = '';
        document.getElementById('test-log').textContent = '';
        document.getElementById('progress-bar').style.width = '0%';
        log('测试结果已清除');
      }

      function getAdminFrame() {
        const frame = document.getElementById('admin-frame');
        return frame.contentWindow;
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function waitForLoad() {
        const admin = getAdminFrame();
        let attempts = 0;

        log('  等待页面加载...', 'info');

        // 等待 document 和 body 加载完成
        while (!admin.document || !admin.document.body) {
          await sleep(500);
          attempts++;

          if (attempts > 20) {
            throw new Error('页面加载超时（document/body 不存在）');
          }
        }

        // 等待页面完全加载
        while (admin.document.readyState !== 'complete') {
          await sleep(500);
          attempts++;

          if (attempts > 40) {
            log('  页面 readyState 超时，尝试继续...', 'warn');
            break;
          }
        }

        log('  页面加载完成（readyState: ' + admin.document.readyState + '）', 'info');

        // 等待 PluginLoader 可用
        attempts = 0;
        while (!admin.PluginLoader) {
          await sleep(500);
          attempts++;

          if (attempts > 20) {
            log('  PluginLoader 超时，尝试继续...', 'warn');
            break;
          }
        }

        if (admin.PluginLoader) {
          log('  PluginLoader 已加载', 'info');
        }

        // 额外等待确保插件加载完成
        await sleep(3000);
        log('  等待完成，开始测试', 'info');
      }

      async function switchToPage(admin, sectionName) {
        const navItem = admin.document.querySelector(`[data-section="${sectionName}"]`);
        if (!navItem) {
          // 尝试使用 data-action 方式
          const navItem2 = admin.document.querySelector(
            `[data-action="switch-section"][data-section="${sectionName}"]`
          );
          if (!navItem2) {
            log(`  未找到页面: ${sectionName}`, 'error');
            return false;
          }
          navItem2.click();
        } else {
          navItem.click();
        }
        await sleep(2000);
        return true;
      }

      // ==================== 测试用例 ====================

      // 测试1: 插件加载
      async function testPluginLoad(admin) {
        log('测试1: 插件加载', 'info');

        try {
          // 等待插件加载完成
          await sleep(3000);

          // 检查插件是否已加载到 PluginLoader
          const plugin = admin.PluginLoader.get('npc');
          if (!plugin) {
            // 尝试手动加载
            log('  尝试手动加载插件...', 'warn');
            try {
              await admin.PluginLoader.load('npc', false);
              await sleep(1000);
            } catch (e) {
              addResult('test-1', '插件加载', false, 'PluginLoader 中未找到 npc 插件，且手动加载失败: ' + e.message);
              return;
            }
          }

          // 再次检查
          const plugin2 = admin.PluginLoader.get('npc');
          if (!plugin2) {
            addResult('test-1', '插件加载', false, 'PluginLoader 中未找到 npc 插件');
            return;
          }

          addResult('test-1', '插件加载', true, '插件加载成功（PluginLoader）');
        } catch (error) {
          addResult('test-1', '插件加载', false, error.message);
        }
      }

      // 测试2: NPC列表渲染
      async function testNPClistRender(admin) {
        log('测试2: NPC列表渲染', 'info');

        try {
          // 切换到NPC配置页面（正确的section名称是npcScene）
          const switched = await switchToPage(admin, 'npcScene');
          if (!switched) {
            addResult('test-2', 'NPC列表渲染', false, '无法切换到NPC配置页面');
            return;
          }

          // 等待列表渲染（增加等待时间）
          await sleep(3000);

          // 检查NPC列表容器
          const listContainer = admin.document.getElementById('counselor-list');
          if (!listContainer) {
            addResult('test-2', 'NPC列表渲染', false, 'NPC列表容器不存在（ID: counselor-list）');
            return;
          }

          // 等待 renderNpcConfig() 执行完成（渲染是异步的）
          await sleep(2000);

          // 检查是否有NPC卡片（正确的selector是 .asset-cell）
          let npcCards = listContainer.querySelectorAll('.asset-cell');
          log(`  找到 ${npcCards.length} 个NPC卡片 (.asset-cell)`, 'info');

          // 如果找不到卡片，尝试等待更长时间后二次查找
          if (npcCards.length === 0) {
            log('  未找到NPC卡片，等待更长时间...', 'warn');
            await sleep(3000);
            npcCards = listContainer.querySelectorAll('.asset-cell');
            log(`  第二次查找：找到 ${npcCards.length} 个NPC卡片`, 'info');

            if (npcCards.length === 0) {
              // 检查是否有空状态提示
              const emptyState = listContainer.querySelector('.empty-state');
              if (emptyState) {
                addResult('test-2', 'NPC列表渲染', false, 'NPC列表为空（显示空状态提示）');
              } else {
                addResult('test-2', 'NPC列表渲染', false, 'NPC列表为空（未找到任何NPC卡片）');
              }
              return;
            }
          }

          addResult('test-2', 'NPC列表渲染', true, `NPC列表渲染成功，共 ${npcCards.length} 个NPC`);

          // 额外验证：检查卡片是否包含必要信息
          let validCards = 0;
          npcCards.forEach((card) => {
            const name = card.querySelector('.cell-name');
            if (name && name.textContent.trim()) {
              validCards++;
            }
          });
          log(`  有效NPC卡片（包含名称）: ${validCards}/${npcCards.length}`, 'info');
        } catch (error) {
          addResult('test-2', 'NPC列表渲染', false, error.message);
        }
      }

      // 测试3: 创建NPC
      async function testCreateNPC(admin) {
        log('测试3: 创建NPC', 'info');

        try {
          // 确保切换到NPC配置页面
          await switchToPage(admin, 'npcScene');
          await sleep(1000);

          // 检查创建按钮（查看页面中的实际按钮）
          const createBtn = admin.document.querySelector(
            'button[onclick*="openNpcEditModal"], button[data-action*="open-npc"], .btn-primary'
          );
          if (!createBtn) {
            // 尝试查找包含"新建"或"添加"的按钮
            const allButtons = admin.document.querySelectorAll('button');
            let foundBtn = null;
            for (let btn of allButtons) {
              if (
                btn.textContent.includes('新建') ||
                btn.textContent.includes('添加') ||
                btn.textContent.includes('NPC')
              ) {
                foundBtn = btn;
                break;
              }
            }

            if (!foundBtn) {
              addResult('test-3', '创建NPC', false, '创建NPC按钮不存在');
              return;
            }
            foundBtn.click();
          } else {
            createBtn.click();
          }

          await sleep(1500);

          // 检查弹窗是否显示
          const modal = admin.document.getElementById('npc-edit-modal');
          if (!modal) {
            addResult('test-3', '创建NPC', false, 'NPC编辑弹窗不存在（ID: npc-edit-modal）');
            return;
          }

          if (modal.style.display === 'none') {
            addResult('test-3', '创建NPC', false, 'NPC编辑弹窗未显示（display=none）');
            return;
          }

          addResult('test-3', '创建NPC', true, 'NPC编辑弹窗显示正常');

          // 关闭弹窗
          const closeBtn = modal.querySelector(
            '.modal-close, [data-action="close-modal"], [data-action="close-this-modal"]'
          );
          if (closeBtn) {
            closeBtn.click();
            await sleep(500);
          }
        } catch (error) {
          addResult('test-3', '创建NPC', false, error.message);
        }
      }

      // 测试4: 编辑NPC
      async function testEditNPC(admin) {
        log('测试4: 编辑NPC', 'info');

        try {
          // 确保切换到NPC配置页面
          await switchToPage(admin, 'npcScene');
          await sleep(2000);

          // 等待列表渲染完成
          await sleep(2000);

          // 获取第一个NPC卡片（使用正确的选择器 .asset-cell）
          let firstCard = admin.document.querySelector('#counselor-list .asset-cell');

          // 如果找不到卡片，尝试等待更长时间
          if (!firstCard) {
            log('  未找到NPC卡片，等待更长时间...', 'warn');
            await sleep(3000);

            firstCard = admin.document.querySelector('#counselor-list .asset-cell');
            if (!firstCard) {
              // 检查列表容器内容
              const container = admin.document.getElementById('counselor-list');
              const containerHTML = container ? container.innerHTML.substring(0, 200) : '容器不存在';
              addResult('test-4', '编辑NPC', false, `没有NPC数据（列表为空）。容器内容: ${containerHTML}`);
              return;
            }
          }

          log(`  找到NPC卡片: ${firstCard.id}`, 'info');

          // 方法1: 直接点击卡片触发 openCounselorDetail
          log('  尝试点击卡片打开编辑弹窗...', 'info');
          firstCard.click();
          await sleep(1500);

          // 检查是否打开了详情/编辑弹窗
          let modal = admin.document.getElementById('npc-edit-modal');

          // 如果没打开，尝试方法2: 点击菜单按钮然后点击编辑选项
          if (!modal || modal.style.display === 'none') {
            log('  卡片点击未打开弹窗，尝试点击菜单按钮...', 'warn');

            // 查找菜单按钮
            const menuBtn = firstCard.querySelector('[data-action="toggle-cell-menu"]');
            if (menuBtn) {
              menuBtn.click();
              await sleep(500);

              // 查找下拉菜单中的编辑选项
              const editOption = admin.document.querySelector('.cell-dropdown .dropdown-item');
              if (editOption && editOption.textContent.includes('编辑')) {
                editOption.click();
                await sleep(1500);
              }
            }

            modal = admin.document.getElementById('npc-edit-modal');
          }

          // 检查弹窗是否显示
          if (!modal) {
            addResult('test-4', '编辑NPC', false, 'NPC编辑弹窗不存在（ID: npc-edit-modal）');
            return;
          }

          if (modal.style.display === 'none') {
            addResult('test-4', '编辑NPC', false, 'NPC编辑弹窗未显示（display=none）');
            return;
          }

          addResult('test-4', '编辑NPC', true, 'NPC编辑弹窗显示正常');

          // 关闭弹窗
          const closeBtn = modal.querySelector(
            '.modal-close, [data-action="close-modal"], [data-action="close-this-modal"]'
          );
          if (closeBtn) {
            closeBtn.click();
            await sleep(500);
          } else {
            // 尝试ESC键关闭
            admin.document.dispatchEvent(new KeyboardEvent('keydown', { key: 'Escape' }));
            await sleep(500);
          }
        } catch (error) {
          addResult('test-4', '编辑NPC', false, error.message);
        }
      }

      // 测试5: 删除NPC
      async function testDeleteNPC(admin) {
        log('测试5: 删除NPC', 'info');

        try {
          // 检查 deleteCounselor 函数是否存在
          if (typeof admin.deleteCounselor !== 'function') {
            addResult('test-5', '删除NPC', false, 'deleteCounselor 函数不存在');
            return;
          }

          // 确保切换到NPC配置页面
          await switchToPage(admin, 'npcScene');
          await sleep(2000);

          // 等待列表渲染完成（增加等待时间）
          await sleep(3000);

          // 检查是否有NPC数据（使用正确的选择器 .asset-cell）
          let firstCard = admin.document.querySelector('#counselor-list .asset-cell');

          // 如果找不到卡片，尝试等待更长时间
          if (!firstCard) {
            log('  未找到NPC卡片，等待更长时间...', 'warn');
            await sleep(5000);

            firstCard = admin.document.querySelector('#counselor-list .asset-cell');
            if (!firstCard) {
              // 检查容器内容，帮助诊断问题
              const container = admin.document.getElementById('counselor-list');
              let debugInfo = '容器不存在';
              if (container) {
                const emptyState = container.querySelector('.empty-state');
                if (emptyState) {
                  debugInfo = '显示空状态提示（无NPC数据）';
                } else {
                  debugInfo = '容器存在但无 .asset-cell 元素。HTML: ' + container.innerHTML.substring(0, 300);
                }
              }
              addResult('test-5', '删除NPC', false, `没有NPC数据（列表为空）。${debugInfo}`);
              return;
            }
          }

          log(`  找到NPC卡片: ${firstCard.id}，尝试打开删除菜单...`, 'info');

          // 方法1（推荐）：直接调用全局函数 toggleCellMenu(btn)
          // 因为菜单按钮默认是隐藏的（opacity: 0），需要hover才显示
          // 所以直接调用函数比模拟点击更可靠
          const menuBtn = firstCard.querySelector('.cell-menu-btn');

          if (menuBtn && typeof admin.toggleCellMenu === 'function') {
            log('  使用 toggleCellMenu() 函数打开菜单...', 'info');
            admin.toggleCellMenu(menuBtn);
            await sleep(1000);
          }
          // 方法2：如果函数不存在，尝试直接点击菜单按钮
          else if (menuBtn) {
            log('  toggleCellMenu 函数不存在，尝试点击菜单按钮...', 'warn');
            // 先让按钮可见
            menuBtn.style.opacity = '1';
            menuBtn.click();
            await sleep(1000);
          }
          // 方法3：如果找不到菜单按钮，尝试查找下拉菜单并直接添加open类
          else {
            log('  未找到菜单按钮，尝试直接操作下拉菜单...', 'warn');
            const dropdown = firstCard.querySelector('.cell-dropdown');
            if (dropdown) {
              dropdown.classList.add('open');
              await sleep(1000);
            } else {
              // 调试：输出卡片的HTML结构
              const cardHTML = firstCard.innerHTML.substring(0, 500);
              addResult('test-5', '删除NPC', false, `未找到菜单按钮或下拉菜单。卡片HTML: ${cardHTML}`);
              return;
            }
          }

          log('  菜单已打开，查找删除按钮...', 'info');

          // 查找删除按钮（限定在第一个卡片的范围内）
          const dropdown = firstCard.querySelector('.cell-dropdown');
          let deleteBtn = null;

          if (dropdown) {
            // 方法1：在打开的dropdown中查找删除按钮
            deleteBtn = dropdown.querySelector('.dropdown-item.danger');

            // 如果找不到，尝试其他选择器
            if (!deleteBtn) {
              deleteBtn = dropdown.querySelector('[onclick*="deleteCounselor"]');
            }
            if (!deleteBtn) {
              deleteBtn = Array.from(dropdown.querySelectorAll('.dropdown-item, button')).find(
                (btn) => btn.textContent.includes('删除') || btn.textContent.includes('🗑')
              );
            }
          } else {
            // 备用方案：在整个文档中查找（可能下拉菜单不在卡片内）
            log('  未在卡片内找到 dropdown，尝试在文档中查找...', 'warn');
            deleteBtn = admin.document.querySelector('.cell-dropdown .dropdown-item.danger');
            if (!deleteBtn) {
              deleteBtn = admin.document.querySelector('[onclick*="deleteCounselor"]');
            }
          }

          if (!deleteBtn) {
            // 调试：输出下拉菜单的HTML
            const dropdownHTML = dropdown ? dropdown.innerHTML.substring(0, 300) : '下拉菜单不存在';
            addResult('test-5', '删除NPC', false, `未找到删除按钮。下拉菜单内容: ${dropdownHTML}`);
            // 关闭菜单
            if (typeof admin.toggleCellMenu === 'function') {
              admin.toggleCellMenu(menuBtn);
            } else {
              admin.document.body.click();
            }
            await sleep(500);
            return;
          }

          log('  找到删除按钮，删除功能入口正常', 'info');

          addResult('test-5', '删除NPC', true, 'deleteCounselor 函数存在，删除按钮可访问');

          // 关闭菜单（使用toggleCellMenu或点击body）
          if (typeof admin.toggleCellMenu === 'function' && menuBtn) {
            admin.toggleCellMenu(menuBtn); // 再次调用会关闭菜单
          } else {
            admin.document.body.click();
          }
          await sleep(500);
        } catch (error) {
          addResult('test-5', '删除NPC', false, error.message);
        }
      }

      // 测试6: 筛选功能
      async function testFilterNPC(admin) {
        log('测试6: 筛选功能', 'info');

        try {
          // 检查筛选下拉框
          const genderFilter = admin.document.getElementById('filter-gender');
          const roleFilter = admin.document.getElementById('filter-role');

          if (!genderFilter || !roleFilter) {
            addResult('test-6', '筛选功能', false, '筛选下拉框不存在');
            return;
          }

          // 测试性别筛选
          if (genderFilter.options.length > 1) {
            genderFilter.selectedIndex = 1;
            genderFilter.dispatchEvent(new Event('change'));
            await sleep(500);
          }

          // 测试身份筛选
          if (roleFilter.options.length > 1) {
            roleFilter.selectedIndex = 1;
            roleFilter.dispatchEvent(new Event('change'));
            await sleep(500);
          }

          addResult('test-6', '筛选功能', true, '筛选功能正常');
        } catch (error) {
          addResult('test-6', '筛选功能', false, error.message);
        }
      }

      // 测试7: 图片上传
      async function testImageUpload(admin) {
        log('测试7: 图片上传', 'info');

        try {
          // 检查图片上传输入框
          const uploadInput = admin.document.getElementById('counselor-upload');
          if (!uploadInput) {
            addResult('test-7', '图片上传', false, '图片上传输入框不存在');
            return;
          }

          addResult('test-7', '图片上传', true, '图片上传功能入口正常');
        } catch (error) {
          addResult('test-7', '图片上传', false, error.message);
        }
      }

      // 测试8: 事件通信
      async function testEventCommunication(admin) {
        log('测试8: 事件通信', 'info');

        try {
          // 检查EventHub是否定义
          if (typeof admin.EventHub === 'undefined') {
            addResult('test-8', '事件通信', false, 'EventHub 未定义');
            return;
          }

          // 测试事件监听
          let eventReceived = false;
          const unsubscribe = admin.EventHub.on('test-npc-event', (data) => {
            eventReceived = true;
            log('  收到测试事件: ' + JSON.stringify(data), 'info');
          });

          // 测试事件发射
          admin.EventHub.emit('test-npc-event', { message: '测试消息' });
          await sleep(500);

          // 取消订阅
          if (typeof unsubscribe === 'function') {
            unsubscribe();
          }

          if (eventReceived) {
            addResult('test-8', '事件通信', true, '事件通信功能正常');
          } else {
            addResult('test-8', '事件通信', false, '事件未被接收');
          }
        } catch (error) {
          addResult('test-8', '事件通信', false, error.message);
        }
      }

      // 测试9: 存储同步
      async function testStorageSync(admin) {
        log('测试9: 存储同步', 'info');

        try {
          // 检查Adapter.storage是否定义
          if (typeof admin.Adapter === 'undefined' || typeof admin.Adapter.storage === 'undefined') {
            addResult('test-9', '存储同步', false, 'Adapter.storage 未定义');
            return;
          }

          // 测试存储
          admin.Adapter.storage.set('test_npc_key', 'test_value');
          const value = admin.Adapter.storage.get('test_npc_key');

          if (value === 'test_value') {
            addResult('test-9', '存储同步', true, '存储同步功能正常');
          } else {
            addResult('test-9', '存储同步', false, '存储值不匹配');
          }

          // 清理测试数据
          admin.Adapter.storage.remove('test_npc_key');
        } catch (error) {
          addResult('test-9', '存储同步', false, error.message);
        }
      }

      // 测试10: NPC聊天功能
      async function testNPCchat(admin) {
        log('测试10: NPC聊天功能', 'info');

        try {
          // 检查插件execute方法
          const plugin = admin.PluginLoader.get('npc');
          if (!plugin || typeof plugin.execute !== 'function') {
            addResult('test-10', 'NPC聊天功能', false, 'NPC插件 execute 方法不存在');
            return;
          }

          // 测试chat action
          const npcs = await plugin.execute({ action: 'list' });
          if (npcs && npcs.length > 0) {
            const response = await plugin.execute({
              action: 'chat',
              id: npcs[0].id,
              message: '你好'
            });

            if (response && response.reply) {
              addResult('test-10', 'NPC聊天功能', true, 'NPC聊天功能正常');
            } else {
              addResult('test-10', 'NPC聊天功能', false, 'NPC回复为空');
            }
          } else {
            addResult('test-10', 'NPC聊天功能', false, '没有NPC数据');
          }
        } catch (error) {
          addResult('test-10', 'NPC聊天功能', false, error.message);
        }
      }

      // 测试11: 背景配置
      async function testBackgroundConfig(admin) {
        log('测试11: 背景配置', 'info');

        try {
          // 确保切换到NPC配置页面
          await switchToPage(admin, 'npcScene');
          await sleep(1000);

          // 切换到背景Tab
          const bgTab = admin.document.querySelector(
            '[data-tab="tab-background"], .npc-tab-btn[data-tab="tab-background"]'
          );
          if (!bgTab) {
            addResult('test-11', '背景配置', false, '背景Tab按钮不存在');
            return;
          }

          bgTab.click();
          await sleep(1500);

          // 检查背景列表
          const bgList = admin.document.getElementById('background-list');
          if (!bgList) {
            addResult('test-11', '背景配置', false, '背景列表容器不存在（ID: background-list）');
            return;
          }

          addResult('test-11', '背景配置', true, '背景配置功能正常');
        } catch (error) {
          addResult('test-11', '背景配置', false, error.message);
        }
      }

      // 测试12: 过渡语池
      async function testTransitionPool(admin) {
        log('测试12: 过渡语池', 'info');

        try {
          // 确保切换到NPC配置页面
          await switchToPage(admin, 'npcScene');
          await sleep(1000);

          // 切换到过渡语池Tab
          const transTab = admin.document.querySelector(
            '[data-tab="tab-transition"], .npc-tab-btn[data-tab="tab-transition"]'
          );
          if (!transTab) {
            addResult('test-12', '过渡语池', false, '过渡语池Tab按钮不存在');
            return;
          }

          transTab.click();
          await sleep(1500);

          // 检查过渡语池容器（正确的ID是transition-list）
          const transPool = admin.document.getElementById('transition-list');
          if (!transPool) {
            addResult('test-12', '过渡语池', false, '过渡语池容器不存在（ID: transition-list）');
            return;
          }

          addResult('test-12', '过渡语池', true, '过渡语池功能正常');
        } catch (error) {
          addResult('test-12', '过渡语池', false, error.message);
        }
      }

      // ==================== 运行所有测试 ====================

      async function runAllTests() {
        log('开始运行所有测试...', 'info');
        clearResults();

        const admin = getAdminFrame();

        try {
          // 等待页面加载
          await waitForLoad();
          log('页面加载完成', 'info');

          // 【关键】准备测试数据到localStorage（因为页面渲染从localStorage读取）
          log('准备测试数据到localStorage...', 'info');
          const testNpcs = [
            {
              id: 'npc-test-1',
              seq: 'ZXS-001',
              name: '小星',
              counselorName: '小星',
              role: '心理咨询师',
              avatar: '🌟',
              gender: '女',
              bio: '我是小星，专业的心理咨询师',
              uploadTime: new Date().toISOString()
            },
            {
              id: 'npc-test-2',
              seq: 'ZXS-002',
              name: '小蓝',
              counselorName: '小蓝',
              role: '情感陪伴师',
              avatar: '💙',
              gender: '男',
              bio: '我是小蓝，温暖的陪伴师',
              uploadTime: new Date().toISOString()
            }
          ];

          // 写入localStorage（模拟有NPC数据的状态）
          // 关键：原代码使用 counselORs（多一个O），必须完全匹配原拼写
          const config = {
            counselors: testNpcs,
            backgrounds: [],
            transitions: [],
            defaultCounselorId: 'npc-test-1',
            defaultBackgroundId: ''
          };
          admin.localStorage.setItem('psy_npc_config', JSON.stringify(config));
          log(
            `  已写入 ${testNpcs.length} 个测试NPC到localStorage（键名: psy_npc_config, 数据键: counselors）`,
            'info'
          );

          // 【关键】触发重新渲染
          if (typeof admin.renderNpcConfig === 'function') {
            admin.renderNpcConfig();
            log('  已触发 renderNpcConfig() 重新渲染', 'info');
          } else {
            log('  renderNpcConfig 函数不存在，尝试切换页面触发渲染...', 'warn');
            // 备用方案：切换页面触发渲染
            await switchToPage(admin, 'npcScene');
          }

          // 等待渲染完成
          await sleep(2000);

          // 运行测试
          await testPluginLoad(admin);
          await testNPClistRender(admin);
          await testCreateNPC(admin);
          await testEditNPC(admin);
          await testDeleteNPC(admin);
          await testFilterNPC(admin);
          await testImageUpload(admin);
          await testEventCommunication(admin);
          await testStorageSync(admin);
          await testNPCchat(admin);
          await testBackgroundConfig(admin);
          await testTransitionPool(admin);

          // 显示汇总
          showSummary();

          log('所有测试完成！', 'info');
        } catch (error) {
          log('测试过程中发生错误: ' + error.message, 'error');
        }
      }

      function showSummary() {
        const total = testResults.length;
        const passed = testResults.filter((r) => r.passed).length;
        const failed = total - passed;
        const passRate = total > 0 ? ((passed / total) * 100).toFixed(2) : 0;

        const summaryHtml = `
        <div class="summary">
          <h3>📊 测试汇总</h3>
          <p>总测试数: ${total}</p>
          <p>通过数: ${passed}</p>
          <p>失败数: ${failed}</p>
          <p>通过率: ${passRate}%</p>
        </div>
      `;

        document.getElementById('test-results').insertAdjacentHTML('beforeend', summaryHtml);
      }

      function exportReport() {
        const total = testResults.length;
        const passed = testResults.filter((r) => r.passed).length;
        const failed = total - passed;
        const passRate = total > 0 ? ((passed / total) * 100).toFixed(2) : 0;

        let md = `# 📋 NPC插件测试报告\n\n`;
        md += `**测试日期**: ${new Date().toLocaleDateString()}\n`;
        md += `**测试时间**: ${new Date().toLocaleTimeString()}\n`;
        md += `**测试人员**: rich\n\n`;
        md += `---\n\n`;
        md += `## 📊 测试结果汇总\n\n`;
        md += `| 指标 | 数值 |\n`;
        md += `|------|------|\n`;
        md += `| 总测试数 | ${total} |\n`;
        md += `| 通过数 | ${passed} |\n`;
        md += `| 失败数 | ${failed} |\n`;
        md += `| 通过率 | ${passRate}% |\n\n`;
        md += `---\n\n`;
        md += `## 📝 详细测试结果\n\n`;

        testResults.forEach((result) => {
          md += `### ${result.id.replace('test-', '测试')}. ${result.name}\n`;
          md += `- **状态**: ${result.passed ? '✅ 通过' : '❌ 失败'}\n`;
          md += `- **消息**: ${result.message}\n\n`;
        });

        const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `NPC插件测试报告_${new Date().toISOString().split('T')[0]}.md`;
        a.click();
        URL.revokeObjectURL(url);

        log('测试报告已导出', 'info');
      }

      log('NPC插件测试页面已加载', 'info');
      log('请点击"运行所有测试"按钮开始测试', 'info');
    </script>
  </body>
