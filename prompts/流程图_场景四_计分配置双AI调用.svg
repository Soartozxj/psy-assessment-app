<svg viewBox="0 0 680 720" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>场景四：计分配置 — 唯一有两次 AI 调用的流程</title>
  <desc>③ 计分提取（第一次AI） → ⑥ 计分解析（第二次AI） → 评分引擎JSON → 导入scale.scoring</desc>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="40" y="15" width="600" height="35" rx="8" fill="#185FA5"/>
  <text x="340" y="37" text-anchor="middle" fill="white" font-size="13" font-family="sans-serif" font-weight="500">场景四：计分配置 — 唯一有两次 AI 调用的流程</text>

  <rect x="40" y="60" width="600" height="32" rx="6" fill="#378ADD"/>
  <text x="340" y="80" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif" font-weight="500">第一次 AI：③ 计分提取（ai-scoring-test.html · startExtract）</text>

  <rect x="40" y="100" width="600" height="55" rx="10" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="0.5"/>
  <text x="60" y="120" fill="#042C53" font-size="11" font-family="sans-serif" font-weight="500">输入来源</text>
  <rect x="55" y="128" width="160" height="20" rx="4" fill="#378ADD"/>
  <text x="135" y="142" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif">上传 docx → JSZip 解析</text>
  <polyline points="215,138 245,138" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#ar)"/>
  <rect x="250" y="128" width="160" height="20" rx="4" fill="#B5D4F4"/>
  <text x="330" y="142" text-anchor="middle" fill="#0C447C" font-size="10" font-family="sans-serif">直接粘贴文本到 textarea</text>

  <polyline points="330,155 330,170" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#ar)"/>

  <rect x="40" y="175" width="600" height="70" rx="10" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="0.5"/>
  <text x="60" y="195" fill="#042C53" font-size="11" font-family="sans-serif" font-weight="500">Prompt 选择</text>

  <rect x="55" y="205" width="160" height="32" rx="5" fill="#185FA5"/>
  <text x="135" y="221" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="500">admin-legacy → postMessage</text>
  <text x="135" y="233" text-anchor="middle" fill="#B5D4F4" font-size="8" font-family="sans-serif">_sysPromptVersions 传递版本列表</text>

  <polyline points="215,221 245,221" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#ar)"/>

  <rect x="250" y="205" width="180" height="32" rx="5" fill="#378ADD"/>
  <text x="340" y="221" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif">用户选择版本 v1.0/v2.0/v3.1</text>

  <polyline points="430,221 460,221" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#ar)"/>

  <rect x="465" y="205" width="160" height="32" rx="5" fill="#B5D4F4"/>
  <text x="545" y="221" text-anchor="middle" fill="#0C447C" font-size="10" font-family="sans-serif">getSelectedSysPrompt()</text>

  <polyline points="340,250 340,268" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#ar)"/>

  <rect x="40" y="273" width="600" height="45" rx="10" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
  <text x="60" y="293" fill="#854F0B" font-size="11" font-family="sans-serif" font-weight="500">AI#1 调用</text>
  <rect x="55" y="300" width="570" height="14" rx="4" fill="#BA7517"/>
  <text x="340" y="311" text-anchor="middle" fill="white" font-size="9" font-family="sans-serif">callAi([role:system ③scoring, role:user manualText]) → DeepSeek/Qwen</text>

  <polyline points="340,318 340,335" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#ar)"/>

  <rect x="40" y="340" width="600" height="55" rx="10" fill="#EEEDFE" stroke="#CECBF6" stroke-width="0.5"/>
  <text x="60" y="360" fill="#26215C" font-size="11" font-family="sans-serif" font-weight="500">AI#1 输出</text>
  <rect x="55" y="368" width="280" height="20" rx="4" fill="#7F77DD"/>
  <text x="195" y="382" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif">结构化计分规则文字（含摘要+正文）</text>
  <rect x="350" y="368" width="275" height="20" rx="4" fill="#534AB7"/>
  <text x="487" y="382" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif">写入 textarea#output-text 供用户确认</text>

  <line x1="40" y1="410" x2="640" y2="410" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="340" y="405" text-anchor="middle" fill="#888780" font-size="9" font-family="sans-serif">用户确认后 → 进入 Step 2</text>

  <rect x="40" y="420" width="600" height="32" rx="6" fill="#854F0B"/>
  <text x="340" y="440" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif" font-weight="500">第二次 AI：⑥ 计分解析 · 硬编码（ai-scoring-test.html · startParse）</text>

  <rect x="40" y="460" width="600" height="55" rx="10" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
  <text x="60" y="480" fill="#854F0B" font-size="11" font-family="sans-serif" font-weight="500">输入：AI#1 输出的计分规则文字</text>
  <rect x="55" y="490" width="180" height="18" rx="4" fill="#FAC775"/>
  <text x="145" y="503" text-anchor="middle" fill="#854F0B" font-size="10" font-family="sans-serif">textarea#output-text 内容</text>
  <polyline points="235,499 265,499" fill="none" stroke="#BA7517" stroke-width="1" marker-end="url(#ar)"/>
  <rect x="270" y="490" width="220" height="18" rx="4" fill="#FAC775"/>
  <text x="380" y="503" text-anchor="middle" fill="#854F0B" font-size="10" font-family="sans-serif">buildPrompt(userText).system</text>

  <polyline points="380,508 380,528" fill="none" stroke="#BA7517" stroke-width="1.2" marker-end="url(#ar)"/>

  <rect x="40" y="533" width="600" height="55" rx="10" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
  <text x="60" y="553" fill="#854F0B" font-size="11" font-family="sans-serif" font-weight="500">Prompt 来源：硬编码 JS 模板</text>
  <rect x="55" y="562" width="280" height="18" rx="4" fill="#BA7517"/>
  <text x="195" y="575" text-anchor="middle" fill="white" font-size="9" font-family="sans-serif">getDefaultPromptText() 硬编码字符串</text>
  <rect x="350" y="562" width="275" height="18" rx="4" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
  <text x="487" y="575" text-anchor="middle" fill="#854F0B" font-size="9" font-family="sans-serif">psy_scoring_prompt_custom 覆盖机制</text>

  <polyline points="380,593 380,610" fill="none" stroke="#BA7517" stroke-width="1.2" marker-end="url(#ar)"/>

  <rect x="40" y="615" width="600" height="40" rx="10" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
  <text x="60" y="635" fill="#854F0B" font-size="11" font-family="sans-serif" font-weight="500">AI#2 调用</text>
  <rect x="55" y="642" width="570" height="10" rx="4" fill="#BA7517"/>
  <text x="340" y="651" text-anchor="middle" fill="white" font-size="9" font-family="sans-serif">callAi([role:system ⑥scoring-parse, role:user userText]) → DeepSeek/Qwen</text>

  <polyline points="380,655 380,672" fill="none" stroke="#BA7517" stroke-width="1.2" marker-end="url(#ar)"/>

  <rect x="40" y="677" width="600" height="55" rx="10" fill="#EEEDFE" stroke="#CECBF6" stroke-width="0.5"/>
  <text x="60" y="697" fill="#26215C" font-size="11" font-family="sans-serif" font-weight="500">AI#2 输出 → 最终存储</text>
  <rect x="55" y="705" width="200" height="20" rx="4" fill="#7F77DD"/>
  <text x="155" y="719" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif">评分引擎 JSON 预览</text>
  <polyline points="255,715 285,715" fill="none" stroke="#7F77DD" stroke-width="1" marker-end="url(#ar)"/>
  <rect x="290" y="705" width="155" height="20" rx="4" fill="#534AB7"/>
  <text x="367" y="719" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif">用户确认 → scale.scoring</text>
</svg>