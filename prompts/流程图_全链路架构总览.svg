  <rect x="195" y="328" width="120" height="44" rx="8" fill="#378ADD" stroke="#378ADD" stroke-width="0.5"/>
  <text x="255" y="347" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif" font-weight="500">⑦ 输出格式</text>
