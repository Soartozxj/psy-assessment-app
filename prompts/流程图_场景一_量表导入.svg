<svg viewBox="0 0 680 700" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>场景一：量表导入（AI 生成 CSV/JSON）</title>
  <desc>admin-legacy.html → 用户输入手册原文 → AI 生成 CSV 或 JSON 量表数据 → 导入系统</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="40" y="20" width="600" height="40" rx="8" fill="#185FA5"/>
  <text x="340" y="45" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif" font-weight="500">场景一：量表导入 — AI 生成 CSV / JSON 量表</text>

  <rect x="40" y="75" width="600" height="80" rx="12" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="0.5"/>
  <text x="60" y="97" fill="#042C53" font-size="12" font-family="sans-serif" font-weight="500">Step 1 · 输入：量表手册原文</text>

  <rect x="55" y="110" width="200" height="36" rx="6" fill="#378ADD"/>
  <text x="155" y="132" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">用户粘贴 / 上传 docx</text>

  <polyline points="255,128 280,128" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="285" y="110" width="160" height="36" rx="6" fill="#B5D4F4"/>
  <text x="365" y="132" text-anchor="middle" fill="#0C447C" font-size="12" font-family="sans-serif">手册原文（textarea）</text>

  <text x="465" y="132" fill="#5F5E5A" font-size="10" font-family="sans-serif">含题文 + 选项 + 计分规则</text>

  <polyline points="365,146 365,165" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="40" y="170" width="600" height="90" rx="12" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="0.5"/>
  <text x="60" y="192" fill="#042C53" font-size="12" font-family="sans-serif" font-weight="500">Step 2 · Prompt 选择与整合</text>

  <rect x="55" y="208" width="130" height="40" rx="6" fill="#185FA5"/>
  <text x="120" y="226" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="500">① CSV Prompt</text>
  <text x="120" y="242" text-anchor="middle" fill="#B5D4F4" font-size="9" font-family="sans-serif">prompts/CSV导入.md</text>

  <polyline points="185,228 220,228" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="225" y="208" width="200" height="40" rx="6" fill="#378ADD"/>
  <text x="325" y="226" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="500">promptContent + 手册原文</text>
  <text x="325" y="242" text-anchor="middle" fill="#E6F1FB" font-size="9" font-family="sans-serif">手工选择版本后拼接</text>

  <polyline points="425,228 460,228" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="465" y="208" width="160" height="40" rx="6" fill="#B5D4F4"/>
  <text x="545" y="226" text-anchor="middle" fill="#0C447C" font-size="11" font-family="sans-serif" font-weight="500">② JSON Prompt 备选</text>
  <text x="545" y="242" text-anchor="middle" fill="#0C447C" font-size="9" font-family="sans-serif">prompts/JSON导入.md</text>

  <polyline points="325,248 325,268" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="40" y="275" width="600" height="70" rx="12" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
  <text x="60" y="297" fill="#854F0B" font-size="12" font-family="sans-serif" font-weight="500">Step 3 · AI 调用（浏览器直连 / LNMP 代理）</text>

  <rect x="55" y="310" width="260" height="28" rx="6" fill="#BA7517"/>
  <text x="185" y="328" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif">callAi(messages) → DeepSeek / Qwen</text>

  <polyline points="315,324 340,324" fill="none" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="345" y="310" width="130" height="28" rx="6" fill="#FAC775"/>
  <text x="410" y="328" text-anchor="middle" fill="#854F0B" font-size="10" font-family="sans-serif">DEFAULT_PROMPTS[id]</text>

  <rect x="490" y="310" width="135" height="28" rx="6" fill="#FAC775"/>
  <text x="557" y="328" text-anchor="middle" fill="#854F0B" font-size="10" font-family="sans-serif">generateScaleByAi()</text>

  <polyline points="325,345 325,365" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="40" y="370" width="600" height="90" rx="12" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
  <text x="60" y="392" fill="#854F0B" font-size="12" font-family="sans-serif" font-weight="500">Step 4 · AI 返回结果</text>

  <rect x="55" y="408" width="175" height="40" rx="6" fill="#BA7517"/>
  <text x="142" y="425" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif">CSV 文本块（逗号分隔）</text>
  <text x="142" y="441" text-anchor="middle" fill="#FAEEDA" font-size="9" font-family="sans-serif">parseCsvOutput() 解析</text>

  <polyline points="230,428 265,428" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="270" y="408" width="175" height="40" rx="6" fill="#FAC775"/>
  <text x="357" y="425" text-anchor="middle" fill="#854F0B" font-size="11" font-family="sans-serif">JSON 结构化数据</text>
  <text x="357" y="441" text-anchor="middle" fill="#854F0B" font-size="9" font-family="sans-serif">parseJsonOutput() 解析</text>

  <polyline points="445,428 480,428" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="485" y="408" width="140" height="40" rx="6" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
  <text x="555" y="425" text-anchor="middle" fill="#854F0B" font-size="11" font-family="sans-serif">modal 预览编辑</text>
  <text x="555" y="441" text-anchor="middle" fill="#854F0B" font-size="9" font-family="sans-serif">用户手工校对</text>

  <polyline points="340,460 340,480" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="40" y="485" width="600" height="80" rx="12" fill="#EEEDFE" stroke="#CECBF6" stroke-width="0.5"/>
  <text x="60" y="507" fill="#26215C" font-size="12" font-family="sans-serif" font-weight="500">Step 5 · 持久化存储</text>

  <rect x="55" y="520" width="155" height="36" rx="6" fill="#7F77DD"/>
  <text x="132" y="538" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="500">saveScalesData()</text>

  <polyline points="210,538 250,538" fill="none" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="255" y="520" width="170" height="36" rx="6" fill="#534AB7"/>
  <text x="340" y="538" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif">psy_scales_data + synced</text>

  <polyline points="425,538 460,538" fill="none" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="465" y="520" width="160" height="36" rx="6" fill="#7F77DD"/>
  <text x="545" y="538" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif">LNMP → CloudBase 同步</text>

  <rect x="40" y="600" width="600" height="80" rx="12" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="60" y="620" fill="#2C2C2A" font-size="11" font-family="sans-serif" font-weight="500">📍 调用链路追踪</text>

  <rect x="55" y="635" width="140" height="30" rx="4" fill="#D3D1C7"/>
  <text x="125" y="654" text-anchor="middle" fill="#2C2C2A" font-size="10" font-family="sans-serif">admin-legacy.html</text>

  <text x="205" y="654" fill="#5F5E5A" font-size="12" font-family="sans-serif">→</text>

  <rect x="220" y="635" width="100" height="30" rx="4" fill="#D3D1C7"/>
  <text x="270" y="654" text-anchor="middle" fill="#2C2C2A" font-size="10" font-family="sans-serif">line 9093-9280</text>

  <text x="330" y="654" fill="#5F5E5A" font-size="12" font-family="sans-serif">→</text>

  <rect x="345" y="635" width="150" height="30" rx="4" fill="#D3D1C7"/>
  <text x="420" y="654" text-anchor="middle" fill="#2C2C2A" font-size="10" font-family="sans-serif">generateScaleByAi()</text>

  <text x="505" y="654" fill="#5F5E5A" font-size="12" font-family="sans-serif">→</text>

  <rect x="520" y="635" width="105" height="30" rx="4" fill="#D3D1C7"/>
  <text x="572" y="654" text-anchor="middle" fill="#2C2C2A" font-size="10" font-family="sans-serif">callAi()</text>
</svg>