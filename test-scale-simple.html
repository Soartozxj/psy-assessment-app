<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScalePlugin 简化测试</title>
    <style>
      body {
        font-family: monospace;
        padding: 20px;
        background: #f5f5f5;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
      }
      h1 {
        color: #333;
      }
      .test-result {
        margin: 10px 0;
        padding: 10px;
        border-left: 4px solid #ccc;
      }
      .test-result.pass {
        border-color: #4caf50;
        background: #f1f8f1;
      }
      .test-result.fail {
        border-color: #f44336;
        background: #fff0f0;
      }
      .test-result h3 {
        margin: 0 0 10px 0;
      }
      pre {
        background: #f8f8f8;
        padding: 10px;
        border-radius: 4px;
        overflow-x: auto;
      }
      button {
        padding: 10px 20px;
        margin: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🧪 ScalePlugin 简化测试</h1>

      <div>
        <button onclick="runAllTests()">运行所有测试</button>
        <button onclick="checkPlugin()">检查插件</button>
        <button onclick="clearResults()">清空结果</button>
      </div>

      <hr />

      <div id="results"></div>
    </div>

    <script>
      // 模拟Adapter和EventHub（如果不存在）
      if (typeof window.Adapter === 'undefined') {
        window.Adapter = {
          storage: {
            get: function (key) {
              return localStorage.getItem(key);
            },
            set: function (key, value) {
              localStorage.setItem(key, value);
            }
          },
          logger: {
            error: function () {
              console.error.apply(console, arguments);
            }
          },
          ui: {
            toast: function (msg) {
              alert(msg);
            }
          }
        };
      }

      if (typeof window.EventHub === 'undefined') {
        window.EventHub = {
          on: function () {},
          off: function () {},
          emit: function () {}
        };
      }

      // 加载插件
      async function loadPlugin() {
        const scripts = [
          'mini-app-h5/backend/plugin-base.js',
          'mini-app-h5/backend/dual-adapter.js',
          'mini-app-h5/backend/event-hub.js',
          'mini-app-h5/backend/plugins/core/scale-plugin.js'
        ];

        for (const src of scripts) {
          await new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = src;
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
          });
        }
      }

      // 测试结果
      const testResults = [];

      // 记录测试结果
      function recordTest(name, passed, details = '') {
        testResults.push({ name, passed, details });

        const div = document.createElement('div');
        div.className = `test-result ${passed ? 'pass' : 'fail'}`;
        div.innerHTML = `
        <h3>${passed ? '✅' : '❌'} ${name}</h3>
        ${details ? `<pre>${details}</pre>` : ''}
      `;

        document.getElementById('results').appendChild(div);
      }

      // 检查插件
      async function checkPlugin() {
        await loadPlugin();

        console.log('ScalePlugin:', window.ScalePlugin);
        console.log('typeof ScalePlugin:', typeof window.ScalePlugin);

        if (window.ScalePlugin) {
          const plugin = new window.ScalePlugin();
          console.log('Plugin instance:', plugin);
          console.log('Methods:', Object.getOwnPropertyNames(Object.getPrototypeOf(plugin)));
        }
      }

      // 运行所有测试
      async function runAllTests() {
        clearResults();
        await loadPlugin();

        // 创建插件实例
        const plugin = new window.ScalePlugin();

        // 测试 1: 检查类定义
        recordTest(
          'ScalePlugin 类已定义',
          typeof window.ScalePlugin === 'function',
          `typeof ScalePlugin = ${typeof window.ScalePlugin}`
        );

        // 测试 2: 检查实例方法
        const methods = [
          'init',
          'install',
          'uninstall',
          'getInfo',
          'isInstalled',
          'loadScales',
          'saveScales',
          'deleteScale',
          'editScale',
          'showScaleForm',
          'hideScaleForm',
          'exportScales',
          '_saveScales',
          '_loadScales'
        ];

        methods.forEach((method) => {
          recordTest(
            `方法 ${method} 存在`,
            typeof plugin[method] === 'function',
            `typeof plugin.${method} = ${typeof plugin[method]}`
          );
        });

        // 测试 3: 检查全局函数
        const globalFuncs = [
          'loadScales',
          'saveScale',
          'deleteScale',
          'editScale',
          'showScaleForm',
          'hideScaleForm',
          'exportScales'
        ];

        globalFuncs.forEach((func) => {
          recordTest(
            `全局函数 ${func} 存在`,
            typeof window[func] === 'function',
            `typeof window.${func} = ${typeof window[func]}`
          );
        });

        // 测试 4: 调用 init 方法
        try {
          const initResult = plugin.init();
          recordTest('init() 可调用', true, `result = ${JSON.stringify(initResult)}`);
        } catch (e) {
          recordTest('init() 可调用', false, e.message);
        }

        // 测试 5: 调用 getInfo 方法
        try {
          const info = plugin.getInfo();
          recordTest('getInfo() 可调用', true, `info = ${JSON.stringify(info)}`);
        } catch (e) {
          recordTest('getInfo() 可调用', false, e.message);
        }

        // 统计
        const total = testResults.length;
        const passed = testResults.filter((r) => r.passed).length;
        const failed = total - passed;
        const passRate = ((passed / total) * 100).toFixed(1);

        recordTest(`测试完成 (${passRate}% 通过)`, failed === 0, `总测试: ${total}, 通过: ${passed}, 失败: ${failed}`);
      }

      // 清空结果
      function clearResults() {
        document.getElementById('results').innerHTML = '';
        testResults.length = 0;
      }

      // 页面加载时自动检查
      window.addEventListener('load', () => {
        console.log('页面加载完成，点击按钮开始测试');
      });
    </script>
  </body>
</html>
